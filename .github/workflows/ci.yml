name: CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - 'mobile/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - 'mobile/**'

jobs:
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: edtech_exam_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './backend/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npx eslint . --ignore-pattern node_modules/ --ignore-pattern __tests__/

      - name: Run tests
        run: npm test -- --forceExit --detectOpenHandles
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_NAME: edtech_exam_test
          DB_USER: postgres
          DB_PASSWORD: test
          DB_PORT: 5432
          JWT_SECRET: ci-jwt-secret
          GEMINI_API_KEY: ci-test-key

  backend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './backend/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npx eslint . --ignore-pattern node_modules/

  mobile-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./mobile

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './mobile/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Run lint
        run: npx eslint . --ignore-pattern node_modules/ --ext .ts,.tsx
        continue-on-error: true
