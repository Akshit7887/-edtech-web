<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browse Exams - EdTech AI Test &amp; Learning App</title>
  <link rel="stylesheet" href="css/main.css?v=2">
  <link rel="stylesheet" href="css/dashboard.css?v=2">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="navbar-brand">
      <span class="brand-logo"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/><path d="M8 7h8"/><path d="M8 11h6"/></svg></span>
      EdTech AI Test &amp; Learning App
    </a>
    <ul class="navbar-nav">
      <li><a href="index.html">Home</a></li>
      <li><a href="login.html">Login</a></li>
      <li><a href="register.html">Register</a></li>
    </ul>
    <button class="hamburger-btn" aria-label="Open navigation menu" aria-expanded="false" type="button"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="hamburger-icon"><line class="hamburger-line top" x1="3" y1="6" x2="21" y2="6"/><line class="hamburger-line mid" x1="3" y1="12" x2="21" y2="12"/><line class="hamburger-line bot" x1="3" y1="18" x2="21" y2="18"/></svg></button>
  </nav>

  <div class="container" style="padding-top: 96px;">
    <div class="dashboard-header">
      <h1>Available Exams</h1>
      <p>Browse and take exams assigned to you</p>
    </div>
    <div id="alert-container"></div>
    <div id="exam-list">
      <div class="exam-grid">
        <div class="card" style="padding: var(--space-6);">
          <div class="skeleton" style="height: 20px; width: 60%; margin-bottom: var(--space-3);"></div>
          <div class="skeleton" style="height: 14px; width: 80%; margin-bottom: var(--space-2);"></div>
          <div class="skeleton" style="height: 14px; width: 40%;"></div>
        </div>
        <div class="card" style="padding: var(--space-6);">
          <div class="skeleton" style="height: 20px; width: 60%; margin-bottom: var(--space-3);"></div>
          <div class="skeleton" style="height: 14px; width: 80%; margin-bottom: var(--space-2);"></div>
          <div class="skeleton" style="height: 14px; width: 40%;"></div>
        </div>
        <div class="card" style="padding: var(--space-6);">
          <div class="skeleton" style="height: 20px; width: 60%; margin-bottom: var(--space-3);"></div>
          <div class="skeleton" style="height: 14px; width: 80%; margin-bottom: var(--space-2);"></div>
          <div class="skeleton" style="height: 14px; width: 40%;"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/animations.js"></script>
  <script>
    let refreshInterval = null;

    document.addEventListener('DOMContentLoaded', async () => {
      const token = api.getToken();
      if (token) setupNavbar();
      await loadExams();
      refreshInterval = setInterval(loadExams, 30000);
    });

    window.addEventListener('beforeunload', () => {
      if (refreshInterval) clearInterval(refreshInterval);
    });

    async function loadExams() {
      try {
        const res = await api.get('/api/exams?page=1&limit=20');
        const exams = res.data || [];
        const container = document.getElementById('exam-list');
        if (!exams.length) {
          container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">&#x1F4DA;</div><h3>No exams available</h3></div>';
          return;
        }
        container.innerHTML = '<div class="exam-grid">' + exams.map((e, i) => `
          <div class="exam-card anim-fade-up" style="animation-delay:${i * 0.05}s" onclick="${api.getToken() ? `goTo('pages/student/exam.html?id=${e.id}')` : `goTo('login.html')`}">
            <div class="exam-card-title">${e.title}</div>
            <div class="exam-card-meta">
              <span>&#x1F4D6; ${e.subject}</span>
              <span>&#x23F1; ${e.duration_minutes} min</span>
              <span>&#x1F4C4; ${e.total_questions} Q</span>
              ${statusBadge(e.status)}
            </div>
            <div class="exam-card-footer">
              <span style="color:var(--text-dim);font-size:0.85rem">${formatDate(e.created_at)}</span>
              <span class="btn btn-sm ${api.getToken() ? 'btn-primary' : 'btn-secondary'}">${api.getToken() ? 'Take Exam \u2192' : 'Login to Take'}</span>
            </div>
          </div>
        `).join('') + '</div>';
      } catch (e) {
        document.getElementById('exam-list').innerHTML = `<div class="alert alert-red">${e.message}</div>`;
      }
    }
  </script>
  <script src="js/nav.js"></script>
</body>
</html>
