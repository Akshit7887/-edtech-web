<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - EdTech</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/auth.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">
        <h1>📚 EdTech</h1>
        <p>Reset your password</p>
      </div>
      <div id="alert-container"></div>
      <div id="step-1">
        <div class="auth-title">
          <h2>Forgot Password</h2>
          <p>Enter your email and we'll send you an OTP</p>
        </div>
        <form onsubmit="handleForgotPassword(event)">
          <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" class="form-input" id="fp-email" placeholder="you@example.com" required>
          </div>
          <button type="submit" class="btn btn-primary btn-block btn-lg">Send OTP</button>
        </form>
        <div class="auth-footer"><a href="login.html">Back to Login</a></div>
      </div>
      <div id="step-2" style="display:none">
        <div class="auth-title">
          <h2>Reset Password</h2>
          <p>Enter the OTP sent to your email</p>
        </div>
        <div class="otp-inputs" id="fp-otp-inputs">
          <input type="text" class="otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]" autofocus oninput="moveNext(this, 0)" onkeydown="movePrev(this, event)">
          <input type="text" class="otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]" oninput="moveNext(this, 1)" onkeydown="movePrev(this, event)">
          <input type="text" class="otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]" oninput="moveNext(this, 2)" onkeydown="movePrev(this, event)">
          <input type="text" class="otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]" oninput="moveNext(this, 3)" onkeydown="movePrev(this, event)">
          <input type="text" class="otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]" oninput="moveNext(this, 4)" onkeydown="movePrev(this, event)">
          <input type="text" class="otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]" oninput="moveNext(this, 5)" onkeydown="movePrev(this, event)">
        </div>
        <div class="form-group">
          <label class="form-label">New Password</label>
          <input type="password" class="form-input" id="fp-new-password" placeholder="Min 6 characters" minlength="6">
        </div>
        <button class="btn btn-primary btn-block btn-lg" onclick="handleResetPassword()">Reset Password</button>
      </div>
    </div>
  </div>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    let fpIdentifier = '';

    function moveNext(input, idx) {
      if (input.value.length === 1 && idx < 5) {
        document.querySelectorAll('#fp-otp-inputs .otp-input')[idx + 1].focus();
      }
    }

    function movePrev(input, e) {
      if (e.key === 'Backspace' && !input.value) {
        const inputs = document.querySelectorAll('#fp-otp-inputs .otp-input');
        const idx = Array.from(inputs).indexOf(input);
        if (idx > 0) inputs[idx - 1].focus();
      }
    }

    async function handleForgotPassword(e) {
      e.preventDefault();
      clearAlerts();
      const email = document.getElementById('fp-email').value.trim();
      fpIdentifier = email;
      try {
        await forgotPassword(email);
        showAlert('OTP sent to your email', 'success', document.getElementById('alert-container'));
        document.getElementById('step-1').style.display = 'none';
        document.getElementById('step-2').style.display = 'block';
      } catch (e) {
        showAlert(e.message, 'error', document.getElementById('alert-container'));
      }
    }

    async function handleResetPassword() {
      clearAlerts();
      const inputs = document.querySelectorAll('#fp-otp-inputs .otp-input');
      const otp = Array.from(inputs).map(i => i.value).join('');
      const newPassword = document.getElementById('fp-new-password').value;
      if (otp.length !== 6) { showAlert('Enter complete OTP', 'error', document.getElementById('alert-container')); return; }
      if (!newPassword || newPassword.length < 6) { showAlert('Password must be at least 6 characters', 'error', document.getElementById('alert-container')); return; }
      try {
        await resetPassword(fpIdentifier, otp, newPassword);
        showAlert('Password reset successfully!', 'success', document.getElementById('alert-container'));
        setTimeout(() => goTo('login.html'), 2000);
      } catch (e) {
        showAlert(e.message, 'error', document.getElementById('alert-container'));
      }
    }
  </script>
</body>
</html>
