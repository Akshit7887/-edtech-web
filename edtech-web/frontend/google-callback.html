<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signing in... - EdTech AI Test &amp; Learning App</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/auth.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="auth-card" style="text-align:center">
      <div class="auth-logo">
        <h1>EdTech AI Test &amp; Learning App</h1>
        <p>Completing sign in...</p>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:var(--space-4);padding:var(--space-8) 0;">
        <div class="spinner-lg" style="border-color: var(--border); border-top-color: var(--accent);"></div>
        <span style="font-size:var(--text-sm);color:var(--text-muted);">Signing you in with Google...</span>
      </div>
      <div id="alert-container" style="margin-top:16px"></div>
    </div>
  </div>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/google-auth.js"></script>
  <script src="js/animations.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      handleGoogleCallback();
    });
  </script>
</body>
</html>
