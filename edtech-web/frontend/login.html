<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - EdTech</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/auth.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">
        <h1>📚 EdTech</h1>
        <p>Sign in to your account</p>
      </div>
      <div id="alert-container"></div>
      <div class="auth-role-selector" id="role-selector">
        <button class="role-option selected" data-role="student" onclick="selectRole('student')">
          <span class="role-icon">🎓</span> Student
        </button>
        <button class="role-option" data-role="teacher" onclick="selectRole('teacher')">
          <span class="role-icon">👨‍🏫</span> Teacher
        </button>
      </div>
      <form id="login-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" class="form-input" id="email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="password-input-wrap">
            <input type="password" class="form-input" id="password" placeholder="Enter password" required>
            <button type="button" class="toggle-password" onclick="togglePassword('password')">👁️</button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg" id="login-btn">
          <span id="login-text">Send OTP</span>
          <span id="login-spinner" class="spinner spinner-sm" style="display:none"></span>
        </button>
      </form>
      <div class="auth-footer">
        <p>Don't have an account? <a href="register.html">Register here</a></p>
        <p style="margin-top:4px"><a href="forgot-password.html">Forgot Password?</a></p>
      </div>
    </div>
  </div>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    let selectedRole = 'student';

    function selectRole(role) {
      selectedRole = role;
      document.querySelectorAll('.role-option').forEach(el => {
        el.classList.toggle('selected', el.dataset.role === role);
      });
    }

    async function handleLogin(e) {
      e.preventDefault();
      clearAlerts();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('login-btn');
      const text = document.getElementById('login-text');
      const spinner = document.getElementById('login-spinner');

      btn.disabled = true; text.textContent = 'Sending...'; spinner.style.display = 'inline-block';

      try {
        const data = await loginRequest(email, password, selectedRole);
        showAlert(data.message || 'OTP sent to your email', 'success', document.getElementById('alert-container'));
        sessionStorage.setItem('otp_identifier', email);
        sessionStorage.setItem('otp_role', selectedRole);
        sessionStorage.setItem('otp_user_id', data.user_id);
        setTimeout(() => goTo('otp-verify.html'), 1500);
      } catch (e) {
        showAlert(e.message, 'error', document.getElementById('alert-container'));
        btn.disabled = false; text.textContent = 'Send OTP'; spinner.style.display = 'none';
      }
    }

    function togglePassword(id) {
      const el = document.getElementById(id);
      el.type = el.type === 'password' ? 'text' : 'password';
    }
  </script>
</body>
</html>
