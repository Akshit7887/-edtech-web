<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - EdTech AI Test &amp; Learning App</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/auth.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body class="auth-page">

  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom:12px;color:var(--accent)"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/><path d="M8 7h8"/><path d="M8 11h6"/></svg>
        <h1>EdTech AI Test &amp; Learning App</h1>
        <p>Sign in to your account</p>
      </div>

      <div id="alert-container"></div>

      <div class="auth-role-selector">
        <button class="role-option selected" data-role="student" onclick="selectRole('student')">
          <span class="role-icon">&#x1F393;</span>
          Student
        </button>
        <button class="role-option" data-role="teacher" onclick="selectRole('teacher')">
          <span class="role-icon">&#x1F468;&#x200D;&#x1F3EB;</span>
          Teacher
        </button>
      </div>

      <form id="login-form" onsubmit="handleLogin(event)">
        <div class="form-group form-floating">
          <input type="email" class="form-input" id="email" placeholder=" " required>
          <label class="form-label">Email</label>
        </div>
        <div class="form-group form-floating">
          <div class="password-input-wrap">
            <input type="password" class="form-input" id="password" placeholder=" " required>
            <label class="form-label">Password</label>
            <button type="button" class="toggle-password" onclick="togglePassword('password')" aria-label="Toggle password">&#x1F441;&#xFE0F;</button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg" id="login-btn">
          <span id="login-text">Send OTP</span>
          <span id="login-spinner" class="spinner spinner-sm" style="display:none"></span>
        </button>
      </form>

      <div class="auth-divider">or continue with</div>

      <div id="google-signin-container" style="min-height:40px"></div>
      <button class="btn-google" id="google-fallback-btn" onclick="signInWithGoogle(selectedRole)" style="display:none">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.54 28.59A14.5 14.5 0 0 1 9.5 24c0-1.59.28-3.14.76-4.59l-7.98-6.19A23.94 23.94 0 0 0 0 24c0 3.77.87 7.35 2.56 10.56l7.98-5.97z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 5.97C6.51 42.62 14.62 48 24 48z"/></svg>
        Sign in with Google as <span id="google-role-label">Student</span>
      </button>

      <div class="auth-footer">
        <p>Don't have an account? <a href="register.html">Register here</a></p>
        <p><a href="forgot-password.html">Forgot Password?</a></p>
        <p style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border);font-size:0.8rem"><a href="/admin">🔐 Admin Login</a></p>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/google-auth.js"></script>
  <script>
    (function() {
      const role = getUserRole();
      if (role === 'admin') window.location.href = '/admin';
    })();

    let selectedRole = 'student';

    function selectRole(role) {
      selectedRole = role;
      document.querySelectorAll('.role-option').forEach(el => {
        el.classList.toggle('selected', el.dataset.role === role);
      });
      const label = document.getElementById('google-role-label');
      if (label) label.textContent = role.charAt(0).toUpperCase() + role.slice(1);
    }

    async function handleLogin(e) {
      e.preventDefault();
      clearAlerts();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('login-btn');
      const text = document.getElementById('login-text');
      const spinner = document.getElementById('login-spinner');

      btn.disabled = true; text.textContent = 'Sending...'; spinner.style.display = 'inline-block';

      try {
        const data = await loginRequest(email, password, selectedRole);
        document.getElementById('alert-container').innerHTML = '<div class="alert alert-success">OTP sent to your email</div>';
        sessionStorage.setItem('otp_identifier', email);
        sessionStorage.setItem('otp_role', selectedRole);
        sessionStorage.setItem('otp_user_id', data.user_id);
        setTimeout(() => goTo('otp-verify.html'), 6000);
      } catch (e) {
        showAlert(e.message, 'error', document.getElementById('alert-container'));
        btn.disabled = false; text.textContent = 'Send OTP'; spinner.style.display = 'none';
      }
    }

    function togglePassword(id) {
      const el = document.getElementById(id);
      el.type = el.type === 'password' ? 'text' : 'password';
    }

    document.addEventListener('DOMContentLoaded', () => {
      initGoogleAuth('google-signin-container');
    });
  </script>
  <script src="js/animations.js"></script>
</body>
</html>
