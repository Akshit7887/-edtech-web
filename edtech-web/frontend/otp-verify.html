<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify OTP - EdTech AI Test &amp; Learning App</title>
  <link rel="stylesheet" href="css/main.css?v=2">
  <link rel="stylesheet" href="css/auth.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="auth-page">

  <nav class="navbar">
    <a href="index.html" class="navbar-brand">
      <span class="brand-logo"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/><path d="M8 7h8"/><path d="M8 11h6"/></svg></span>
      EdTech AI Test &amp; Learning App
    </a>
    <ul class="navbar-nav">
      <li><a href="index.html">Home</a></li>
      <li><a href="login.html">Login</a></li>
      <li><a href="register.html">Register</a></li>
    </ul>
    <button class="hamburger-btn" aria-label="Open navigation menu" aria-expanded="false" type="button"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="hamburger-icon"><line class="hamburger-line top" x1="3" y1="6" x2="21" y2="6"/><line class="hamburger-line mid" x1="3" y1="12" x2="21" y2="12"/><line class="hamburger-line bot" x1="3" y1="18" x2="21" y2="18"/></svg></button>
  </nav>

  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">
        <h1>EdTech AI Test &amp; Learning App</h1>
        <p>Verify your identity</p>
      </div>

      <div id="alert-container"></div>

      <div style="text-align:center;margin-bottom:var(--space-8);">
        <h2 style="font-size:var(--text-xl);font-weight:600;margin-bottom:var(--space-2);">Enter OTP</h2>
        <p style="font-size:var(--text-sm);color:var(--text-muted);">A one-time password has been sent to your email</p>
      </div>

      <div class="otp-inputs" id="otp-inputs">
        <input type="text" class="otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]" autofocus oninput="moveNext(this, 0)" onkeydown="movePrev(this, event)">
        <input type="text" class="otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]" oninput="moveNext(this, 1)" onkeydown="movePrev(this, event)">
        <input type="text" class="otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]" oninput="moveNext(this, 2)" onkeydown="movePrev(this, event)">
        <input type="text" class="otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]" oninput="moveNext(this, 3)" onkeydown="movePrev(this, event)">
        <input type="text" class="otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]" oninput="moveNext(this, 4)" onkeydown="movePrev(this, event)">
        <input type="text" class="otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]" oninput="moveNext(this, 5)" onkeydown="movePrev(this, event)">
      </div>

      <button class="btn btn-primary btn-block btn-lg" id="verify-btn" onclick="handleVerifyOtp()">
        <span id="verify-text">Verify OTP</span>
        <span id="verify-spinner" class="spinner spinner-sm" style="display:none"></span>
      </button>

      <div class="auth-footer">
        <p>Didn't receive OTP? <a href="#" onclick="resendOtp()">Resend</a></p>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/animations.js"></script>
  <script>
    const identifier = sessionStorage.getItem('otp_identifier');
    const role = sessionStorage.getItem('otp_role') || 'student';
    const isRegistration = sessionStorage.getItem('otp_registration') === 'true';
    const savedOtp = sessionStorage.getItem('otp_code');

    if (!identifier) { goTo('login.html'); }

    if (savedOtp && savedOtp.length === 6) {
      const inputs = document.querySelectorAll('.otp-input');
      savedOtp.split('').forEach((c, i) => { if (inputs[i]) { inputs[i].value = c; inputs[i].classList.add('filled'); } });
    }

    function moveNext(input, idx) {
      if (input.value.length === 1 && idx < 5) {
        document.querySelectorAll('.otp-input')[idx + 1].focus();
      }
      document.querySelectorAll('.otp-input').forEach(el => {
        el.classList.toggle('filled', el.value.length > 0);
      });
    }

    function movePrev(input, e) {
      if (e.key === 'Backspace' && !input.value) {
        const inputs = document.querySelectorAll('.otp-input');
        const idx = Array.from(inputs).indexOf(input);
        if (idx > 0) inputs[idx - 1].focus();
      }
      document.querySelectorAll('.otp-input').forEach(el => {
        el.classList.toggle('filled', el.value.length > 0);
      });
    }

    async function handleVerifyOtp() {
      clearAlerts();
      const inputs = document.querySelectorAll('.otp-input');
      const otp = Array.from(inputs).map(i => i.value).join('');
      if (otp.length !== 6) {
        showAlert('Please enter the complete 6-digit OTP', 'error', document.getElementById('alert-container'));
        return;
      }

      const btn = document.getElementById('verify-btn');
      const text = document.getElementById('verify-text');
      const spinner = document.getElementById('verify-spinner');
      btn.disabled = true; text.textContent = 'Verifying...'; spinner.style.display = 'inline-block';

      try {
        if (isRegistration) {
          const data = await verifyRegisterOtp(identifier, otp);
          saveSession(data.token, { id: data.user.id, name: data.user.name, role: data.user.role, email: data.user.email, phone: data.user.phone });
          showSuccess();
        } else {
          const data = await verifyOtpRequest(identifier, otp, role);
          saveSession(data.token, { id: data.user.id, name: data.user.name, role: data.user.role, email: data.user.email, phone: data.user.phone });
          showSuccess();
        }
      } catch (e) {
        showAlert(e.message, 'error', document.getElementById('alert-container'));
        btn.disabled = false; text.textContent = 'Verify OTP'; spinner.style.display = 'none';
      }
    }

    function showSuccess() {
      const container = document.querySelector('.auth-card');
      container.innerHTML = `
        <div style="text-align:center;padding:var(--space-8) 0;">
          <div style="width:64px;height:64px;display:flex;align-items:center;justify-content:center;margin:0 auto var(--space-6);background:var(--accent-ghost);border-radius:var(--radius-full);font-size:var(--text-3xl);color:var(--accent);animation:scaleIn 0.4s var(--ease-bounce) both;">&#x2713;</div>
          <h2 style="font-size:var(--text-xl);font-weight:600;margin-bottom:var(--space-2);">Verified Successfully!</h2>
          <p style="color:var(--text-muted);font-size:var(--text-sm);">Redirecting to dashboard...</p>
        </div>
      `;
      const userRole = getUserRole();
      setTimeout(() => goTo('/pages/' + userRole + '/dashboard.html'), 1500);
    }

    async function resendOtp() {
      clearAlerts();
      try {
        if (isRegistration) {
          await sendRegisterOtp('', identifier, '', role);
        } else {
          await loginRequest(identifier, '', role);
        }
        showAlert('OTP resent successfully', 'success', document.getElementById('alert-container'));
      } catch (e) {
        showAlert(e.message, 'error', document.getElementById('alert-container'));
      }
    }
  </script>
  <script src="js/nav.js"></script>
</body>
</html>
