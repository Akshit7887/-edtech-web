<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Classes - Admin - EdTech AI Test & Learning App</title>
  <link rel="stylesheet" href="../../css/main.css?v=2">
  <link rel="stylesheet" href="../../css/dashboard.css?v=2">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar">
    <div class="navbar-brand"><span class="brand-logo"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/><path d="M8 7h8"/><path d="M8 11h6"/></svg></span>EdTech AI Test & Learning App</div>
    <button class="hamburger-btn" aria-label="Open navigation menu" aria-expanded="false" type="button"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="hamburger-icon"><line class="hamburger-line top" x1="3" y1="6" x2="21" y2="6"/><line class="hamburger-line mid" x1="3" y1="12" x2="21" y2="12"/><line class="hamburger-line bot" x1="3" y1="18" x2="21" y2="18"/></svg></button>
  </nav>
  <div class="layout">
    <aside class="sidebar">
      <ul class="sidebar-nav">
        <li><a href="dashboard.html"><span class="nav-icon">📊</span><span>Dashboard</span></a></li>
        <li><a href="users.html"><span class="nav-icon">👥</span><span>Users</span></a></li>
        <li><a href="classes.html" class="active"><span class="nav-icon">🏫</span><span>Classes</span></a></li>
        <li><a href="departments.html"><span class="nav-icon">🏛️</span><span>Departments</span></a></li>
        <li><a href="exams.html"><span class="nav-icon">📝</span><span>Exams</span></a></li>
        <li><a href="db-monitor.html"><span class="nav-icon">🗄️</span><span>DB Monitor</span></a></li>
        <li><a href="#" onclick="logout()"><span class="nav-icon">🚪</span><span>Logout</span></a></li>
      </ul>
    </aside>
    <main class="main-content">
      <div class="page-header" data-aos="fade-up">
        <div>
          <h1>All Classes</h1>
          <p class="text-muted">Manage all classes across teachers</p>
        </div>
      </div>
      <div id="alert-container"></div>
      <div id="classes-container" class="table-container" data-aos="fade-up" data-aos-delay="100"><div class="loading-overlay"><div class="spinner"></div><span>Loading classes...</span></div></div>
    </main>
  </div>
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script>AOS.init({ once: true });</script>
  <script src="../../js/api.js"></script>
  <script src="../../js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      if (!requireRole('admin')) return;
      setupNavbar();
      await loadClasses();
    });

    async function loadClasses() {
      try {
        const res = await api.get('/api/admin/classes');
        const data = res.data || [];
        const container = document.getElementById('classes-container');
        if (!data.length) {
          container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🏫</div><h3>No classes</h3><p>No classes have been created yet.</p></div>';
          return;
        }
        container.innerHTML = `
          <table class="data-table" style="width:100%">
            <thead><tr><th>Name</th><th>Subject</th><th>Teacher</th><th>Students</th><th>Created</th><th></th></tr></thead>
            <tbody>
              ${data.map(c => `
                <tr>
                  <td><strong>${escHtml(c.name)}</strong></td>
                  <td>${escHtml(c.subject||'General')}</td>
                  <td>${escHtml(c.teacher_name||'Unknown')}</td>
                  <td>${c.student_count||0}</td>
                  <td>${formatDate(c.created_at)}</td>
                  <td><button class="btn btn-sm btn-danger" onclick="handleDeleteClass(${c.id})">Delete</button></td>
                </tr>
              `).join('')}
            </tbody>
          </table>
          <div style="margin-top:16px;color:var(--text-muted);font-size:0.85rem">${res.pagination ? 'Page ' + res.pagination.page + ' of ' + res.pagination.total_pages + ' (' + res.pagination.total + ' total)' : ''}</div>
        `;
      } catch (e) {
        document.getElementById('classes-container').innerHTML = `<div class="alert alert-error">${e.message}</div>`;
      }
    }

    async function handleDeleteClass(id) {
      if (!await confirmAction('Delete this class permanently?')) return;
      try {
        await api.del('/api/admin/classes/' + id);
        showAlert('Class deleted', 'success');
        await loadClasses();
      } catch (e) { showAlert(e.message, 'error'); }
    }

    function escHtml(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
  </script>
  <script src="../../js/nav.js"></script>
</body>
</html>
