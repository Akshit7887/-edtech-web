<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Exams - EdTech AI Test &amp; Learning App</title>
  <link rel="stylesheet" href="../../css/main.css">
  <link rel="stylesheet" href="../../css/dashboard.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar">
    <div class="navbar-brand"><span class="brand-logo"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/><path d="M8 7h8"/><path d="M8 11h6"/></svg></span>EdTech AI Test &amp; Learning App</div>
    <button class="hamburger-btn" aria-label="Open navigation menu" aria-expanded="false" type="button"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="hamburger-icon"><line class="hamburger-line top" x1="3" y1="6" x2="21" y2="6"/><line class="hamburger-line mid" x1="3" y1="12" x2="21" y2="12"/><line class="hamburger-line bot" x1="3" y1="18" x2="21" y2="18"/></svg></button>
  </nav>
  <div class="layout">
    <aside class="sidebar">
      <ul class="sidebar-nav">
        <li><a href="dashboard.html"><span class="nav-icon">📊</span><span>Dashboard</span></a></li>
        <li><a href="users.html"><span class="nav-icon">👥</span><span>Users</span></a></li>
        <li><a href="exams.html" class="active"><span class="nav-icon">📝</span><span>Exams</span></a></li>
        <li><a href="db-monitor.html"><span class="nav-icon">🗄️</span><span>DB Monitor</span></a></li>
        <li><a href="#" onclick="logout()"><span class="nav-icon">🚪</span><span>Logout</span></a></li>
      </ul>
    </aside>
    <main class="main-content">
      <div class="dashboard-header" data-aos="fade-up">
        <h1>Exams</h1>
        <p>View all exams across the platform</p>
      </div>
      <div id="alert-container"></div>
      <div id="exam-list" data-aos="fade-up" data-aos-delay="100">
        <div class="exam-grid">
          <div class="skeleton-card"><div class="skeleton-block"><div class="skeleton skeleton-title"></div><div class="skeleton skeleton-text"></div><div class="skeleton skeleton-text short"></div></div></div>
          <div class="skeleton-card"><div class="skeleton-block"><div class="skeleton skeleton-title"></div><div class="skeleton skeleton-text"></div><div class="skeleton skeleton-text short"></div></div></div>
        </div>
      </div>
    </main>
  </div>
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script>AOS.init({ once: true });</script>
  <script src="../../js/api.js"></script>
  <script src="../../js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      if (!requireRole('admin')) return;
      setupNavbar();
      await loadExams();
    });

    async function loadExams() {
      try {
        const res = await api.get('/api/admin/exams?page=1&limit=20');
        const exams = res.data || [];
        const container = document.getElementById('exam-list');
        if (!exams.length) { container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📝</div><h3>No exams found</h3></div>'; return; }
        container.innerHTML = '<div class="exam-grid">' + exams.map((e, i) => `
          <div class="exam-card animate-fade-up" style="animation-delay:${i * 0.05}s">
            <div class="exam-card-title">${e.title}</div>
            <div class="exam-card-meta">
              <span>📖 ${e.subject}</span>
              <span>⏱ ${e.duration_minutes} min</span>
              <span>📄 ${e.total_questions} Q</span>
              ${statusBadge(e.status)}
            </div>
            <div class="exam-card-footer">
              <span style="color:var(--text-dim);font-size:0.85rem">${formatDate(e.created_at)}</span>
              <span style="font-size:0.8rem;color:var(--text-muted)">Teacher: ${e.teacher_name || 'N/A'}</span>
            </div>
          </div>
        `).join('') + '</div>';
      } catch (e) {
        document.getElementById('exam-list').innerHTML = `<div class="alert alert-error">${e.message}</div>`;
      }
    }
  </script>
  <script src="../../js/nav.js"></script>
</body>
</html>
