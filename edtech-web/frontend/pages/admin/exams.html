<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All Exams - EdTech</title>
  <link rel="stylesheet" href="../../css/main.css">
  <link rel="stylesheet" href="../../css/dashboard.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <nav class="navbar">
    <div class="navbar-brand">📚 EdTech Admin</div>
    <ul class="navbar-nav">
      <li><a href="dashboard.html">Dashboard</a></li>
      <li><a href="users.html">Users</a></li>
      <li><a href="exams.html" class="active">All Exams</a></li>
      <!-- USER -->
    </ul>
  </nav>
  <div class="layout">
    <aside class="sidebar">
      <ul class="sidebar-nav">
        <li><a href="dashboard.html"><span class="nav-icon">📊</span><span>Dashboard</span></a></li>
        <li><a href="users.html"><span class="nav-icon">👥</span><span>Users</span></a></li>
        <li><a href="exams.html" class="active"><span class="nav-icon">📝</span><span>All Exams</span></a></li>
        <li><a href="#" onclick="logout()"><span class="nav-icon">🚪</span><span>Logout</span></a></li>
      </ul>
    </aside>
    <main class="main-content">
      <div class="dashboard-header">
        <h1>All Exams</h1>
        <p>View all exams across the platform</p>
      </div>
      <div id="alert-container"></div>
      <div id="exam-list"><div class="loading-overlay"><div class="spinner"></div><span>Loading exams...</span></div></div>
    </main>
  </div>
  <script src="../../js/api.js"></script>
  <script src="../../js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (!requireRole('admin')) return;
      setupNavbar();
      loadAllExams();
    });

    async function loadAllExams() {
      try {
        const res = await api.get('/api/exams?page=1&limit=50');
        const exams = res.data || [];
        const container = document.getElementById('exam-list');
        if (!exams.length) { container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📝</div><h3>No exams created yet</h3></div>'; return; }
        container.innerHTML = '<div class="exam-grid">' + exams.map(e => `
          <div class="exam-card">
            <div class="exam-card-title">${e.title}</div>
            <div class="exam-card-meta">
              <span>📖 ${e.subject}</span>
              <span>⏱ ${e.duration_minutes} min</span>
              <span>📄 ${e.total_questions} Q</span>
              <span>👤 ${e.teacher_name || 'Unknown'}</span>
              ${statusBadge(e.status)}
            </div>
            <div class="exam-card-footer">
              <span style="color:var(--text-dim);font-size:0.85rem">${formatDate(e.created_at)}</span>
              <span class="badge badge-info">${e.students_attended || 0} attended</span>
            </div>
          </div>
        `).join('') + '</div>';
      } catch (e) {
        document.getElementById('exam-list').innerHTML = `<div class="alert alert-error">${e.message}</div>`;
      }
    }
  </script>
</body>
</html>
