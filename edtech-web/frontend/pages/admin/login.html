<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - EdTech AI Test & Learning App</title>
  <link rel="stylesheet" href="../../css/main.css?v=2">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    .admin-login-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
    .admin-login-card { background: #1e293b; border: 1px solid #334155; border-radius: 16px; padding: 48px 40px; width: 100%; max-width: 400px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
    .admin-login-card .logo { text-align: center; margin-bottom: 32px; }
    .admin-login-card .logo svg { color: #6366f1; }
    .admin-login-card .logo h1 { color: #f1f5f9; font-size: 1.25rem; margin-top: 12px; font-weight: 700; }
    .admin-login-card .logo p { color: #64748b; font-size: 0.85rem; margin-top: 4px; }
    .admin-login-card .form-group { margin-bottom: 20px; }
    .admin-login-card .form-group label { display: block; color: #94a3b8; font-size: 0.8rem; font-weight: 500; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
    .admin-login-card .form-group input { width: 100%; padding: 12px 16px; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: #f1f5f9; font-size: 0.95rem; outline: none; transition: border 0.2s; box-sizing: border-box; }
    .admin-login-card .form-group input:focus { border-color: #6366f1; }
    .admin-login-card .form-group input::placeholder { color: #475569; }
    .admin-login-card .btn-admin { width: 100%; padding: 12px; background: #6366f1; color: #fff; border: none; border-radius: 8px; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: background 0.2s; }
    .admin-login-card .btn-admin:hover { background: #4f46e5; }
    .admin-login-card .btn-admin:disabled { opacity: 0.6; cursor: not-allowed; }
    .admin-login-card .error-msg { color: #ef4444; font-size: 0.85rem; text-align: center; margin-top: 12px; display: none; }
    .admin-login-card .footer { text-align: center; margin-top: 24px; color: #475569; font-size: 0.75rem; }
    .admin-login-card .lock-icon { text-align: center; margin-bottom: 16px; }
    .admin-login-card .lock-icon .shield { display: inline-flex; align-items: center; justify-content: center; width: 64px; height: 64px; border-radius: 50%; background: rgba(99,102,241,0.15); }
    .admin-login-card .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .admin-login-page .hamburger-btn { color: #f1f5f9; }
    .admin-login-page .hamburger-btn:hover { color: #fff; background: rgba(255,255,255,0.1); }
    .admin-login-card .alert { padding: 10px 14px; border-radius: 8px; font-size: 0.85rem; margin-bottom: 16px; display: none; }
    .alert-error { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; }
    .alert-success { background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.3); color: #86efac; }
  </style>
</head>
<body class="admin-login-page">

  <nav class="navbar" style="background:rgba(15,23,42,0.95);border-bottom-color:#334155;">
    <a href="../../index.html" class="navbar-brand" style="color:#f1f5f9;">
      <span class="brand-logo"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/><path d="M8 7h8"/><path d="M8 11h6"/></svg></span>
      EdTech AI Test &amp; Learning App
    </a>
    <ul class="navbar-nav">
      <li><a href="../../index.html">Home</a></li>
      <li><a href="../../login.html">Login</a></li>
      <li><a href="../../register.html">Register</a></li>
    </ul>
    <button class="hamburger-btn" aria-label="Open navigation menu" aria-expanded="false" type="button"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="hamburger-icon"><line class="hamburger-line top" x1="3" y1="6" x2="21" y2="6"/><line class="hamburger-line mid" x1="3" y1="12" x2="21" y2="12"/><line class="hamburger-line bot" x1="3" y1="18" x2="21" y2="18"/></svg></button>
  </nav>

  <div class="admin-login-card">
    <div class="logo">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      <h1>Admin Panel</h1>
      <p>EdTech AI Test & Learning App</p>
    </div>
    <div class="alert" id="alert-msg"></div>
    <form id="admin-login-form" onsubmit="return handleLogin(event)">
      <div class="form-group">
        <label for="email">Admin Email</label>
        <input type="email" id="email" placeholder="admin@example.com" required autocomplete="email" autofocus>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn-admin" id="login-btn">Sign In to Admin</button>
      <div class="error-msg" id="error-msg"></div>
    </form>
    <div class="footer">Authorized administrators only</div>
  </div>

  <script src="../../js/api.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const token = api.getToken();
      if (token) {
        const role = localStorage.getItem('user_role');
        if (role === 'admin') window.location.href = 'dashboard.html';
      }
    });

    async function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('login-btn');
      const alertEl = document.getElementById('alert-msg');

      alertEl.style.display = 'none';
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Signing in...';

      try {
        const res = await fetch(API_BASE + '/api/auth/admin-login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const json = await res.json();
        if (!res.ok || !json.success) {
          throw new Error(json.error || json.message || 'Login failed');
        }
        const data = json.data;
        api.setToken(data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        localStorage.setItem('user_role', data.user.role);
        localStorage.setItem('user_id', data.user.id);
        localStorage.setItem('user_name', data.user.name);
        alertEl.className = 'alert alert-success';
        alertEl.textContent = 'Login successful! Redirecting...';
        alertEl.style.display = 'block';
        setTimeout(() => window.location.href = 'dashboard.html', 500);
      } catch (e) {
        btn.disabled = false;
        btn.innerHTML = 'Sign In to Admin';
        alertEl.className = 'alert alert-error';
        alertEl.textContent = e.message;
        alertEl.style.display = 'block';
      }
    }
  </script>
  <script src="../../js/nav.js"></script>
</body>
</html>
