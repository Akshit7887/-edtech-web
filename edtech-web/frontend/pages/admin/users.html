<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Users - EdTech</title>
  <link rel="stylesheet" href="../../css/main.css">
  <link rel="stylesheet" href="../../css/dashboard.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar">
    <div class="navbar-brand">EdTech</div>
    <ul class="navbar-nav">
      <li><a href="dashboard.html">Dashboard</a></li>
      <li><a href="users.html" class="active">Users</a></li>
      <li><a href="exams.html">Exams</a></li>
      <!-- USER -->
    </ul>
  </nav>
  <div class="layout">
    <aside class="sidebar">
      <ul class="sidebar-nav">
        <li><a href="dashboard.html"><span class="nav-icon">📊</span><span>Dashboard</span></a></li>
        <li><a href="users.html" class="active"><span class="nav-icon">👥</span><span>Users</span></a></li>
        <li><a href="exams.html"><span class="nav-icon">📝</span><span>Exams</span></a></li>
        <li><a href="#" onclick="logout()"><span class="nav-icon">🚪</span><span>Logout</span></a></li>
      </ul>
    </aside>
    <main class="main-content">
      <div class="dashboard-header" data-aos="fade-up">
        <h1>Users</h1>
        <p>Manage all platform users</p>
      </div>
      <div id="alert-container"></div>
      <div class="table-container" data-aos="fade-up" data-aos-delay="100">
        <table>
          <thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Phone</th><th>Created</th></tr></thead>
          <tbody id="users-tbody">
            <tr><td colspan="5"><div class="loading-overlay"><div class="spinner"></div></div></td></tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script>AOS.init({ once: true });</script>
  <script src="../../js/api.js"></script>
  <script src="../../js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      if (!requireRole('admin')) return;
      setupNavbar();
      await loadUsers();
    });

    async function loadUsers() {
      try {
        const res = await api.get('/api/admin/users?page=1&limit=100');
        const users = res.data || [];
        const tbody = document.getElementById('users-tbody');
        if (!users.length) {
          tbody.innerHTML = '<tr><td colspan="5"><div class="empty-state"><div class="empty-state-icon">👥</div><h3>No users found</h3></div></td></tr>';
        } else {
          tbody.innerHTML = users.map(u => `
            <tr>
              <td><div class="student-row"><div class="student-avatar">${(u.name || '?').charAt(0).toUpperCase()}</div><strong>${u.name}</strong></div></td>
              <td>${u.email || '-'}</td>
              <td>${statusBadge(u.role)}</td>
              <td>${u.phone || '-'}</td>
              <td>${formatDate(u.created_at)}</td>
            </tr>
          `).join('');
        }
      } catch (e) {
        document.getElementById('users-tbody').innerHTML = `<tr><td colspan="5"><div class="alert alert-error">${e.message}</div></td></tr>`;
      }
    }
  </script>
</body>
</html>
