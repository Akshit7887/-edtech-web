<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Classes - EdTech AI Test & Learning App</title>
  <link rel="stylesheet" href="../../css/main.css?v=2">
  <link rel="stylesheet" href="../../css/dashboard.css?v=2">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar">
    <div class="navbar-brand"><span class="brand-logo"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/><path d="M8 7h8"/><path d="M8 11h6"/></svg></span>EdTech AI Test & Learning App</div>
    <button class="hamburger-btn" aria-label="Open navigation menu" aria-expanded="false" type="button"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="hamburger-icon"><line class="hamburger-line top" x1="3" y1="6" x2="21" y2="6"/><line class="hamburger-line mid" x1="3" y1="12" x2="21" y2="12"/><line class="hamburger-line bot" x1="3" y1="18" x2="21" y2="18"/></svg></button>
  </nav>
  <div class="layout">
    <aside class="sidebar">
      <ul class="sidebar-nav">
        <li><a href="dashboard.html"><span class="nav-icon">📊</span><span>Dashboard</span></a></li>
        <li><a href="profile.html"><span class="nav-icon">👤</span><span>Profile & Settings</span></a></li>
        <li><a href="classes.html" class="active"><span class="nav-icon">🏫</span><span>My Classes</span></a></li>
        <li><a href="results.html"><span class="nav-icon">📝</span><span>My Results</span></a></li>
        <li><a href="syllabus.html"><span class="nav-icon">📖</span><span>Syllabus</span></a></li>
        <li><a href="notifications.html"><span class="nav-icon">🔔</span><span>Notifications</span></a></li>
        <li><a href="#" onclick="logout()"><span class="nav-icon">🚪</span><span>Logout</span></a></li>
      </ul>
    </aside>
    <main class="main-content">
      <div class="dashboard-header" data-aos="fade-up">
        <div><h1>My Classes</h1><p>Classes you are enrolled in</p></div>
      </div>
      <div id="alert-container"></div>
      <div id="classes-container" data-aos="fade-up" data-aos-delay="100"><div class="loading-overlay"><div class="spinner"></div><span>Loading classes...</span></div></div>
    </main>
  </div>
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script>AOS.init({ once: true });</script>
  <script src="../../js/api.js"></script>
  <script src="../../js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      if (!requireRole('student')) return;
      setupNavbar();
      await loadMyClasses();
    });

    async function loadMyClasses() {
      try {
        const res = await api.get('/api/students/classes');
        const classes = res.data || [];
        const container = document.getElementById('classes-container');
        if (!classes.length) {
          container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🏫</div><h3>No classes yet</h3><p>You have not been added to any classes yet.</p></div>';
          return;
        }
        container.innerHTML = '<div class="exam-grid">' + classes.map((c, i) => `
          <div class="exam-card animate-fade-up" style="animation-delay:${i * 0.05}s">
            <div class="exam-card-title">${escHtml(c.name)}</div>
            <div class="exam-card-meta">
              <span>📖 ${escHtml(c.subject || 'General')}</span>
              <span>👥 ${c.student_count || 0} students</span>
              <span>👨‍🏫 ${escHtml(c.teacher_name || 'Unknown')}</span>
            </div>
            <p style="color:var(--text-muted);font-size:0.85rem;margin-bottom:12px">${escHtml(c.description) || ''}</p>
            <div class="exam-card-footer">
              <span style="color:var(--text-dim);font-size:0.85rem">${formatDate(c.created_at)}</span>
            </div>
          </div>
        `).join('') + '</div>';
      } catch (e) {
        document.getElementById('classes-container').innerHTML = `<div class="alert alert-error">${e.message}</div>`;
      }
    }

    function escHtml(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
  </script>
  <script src="../../js/nav.js"></script>
</body>
</html>
