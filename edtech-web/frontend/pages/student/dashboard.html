<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Dashboard - EdTech AI Test &amp; Learning App</title>
  <link rel="stylesheet" href="../../css/main.css?v=2">
  <link rel="stylesheet" href="../../css/dashboard.css?v=2">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <nav class="navbar">
    <a href="dashboard.html" class="navbar-brand">
      <span class="brand-logo"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/><path d="M8 7h8"/><path d="M8 11h6"/></svg></span>
      EdTech AI Test &amp; Learning App
    </a>

    <button class="hamburger-btn" aria-label="Open navigation menu" aria-expanded="false" type="button"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="hamburger-icon"><line class="hamburger-line top" x1="3" y1="6" x2="21" y2="6"/><line class="hamburger-line mid" x1="3" y1="12" x2="21" y2="12"/><line class="hamburger-line bot" x1="3" y1="18" x2="21" y2="18"/></svg></button>
  </nav>
  <div class="layout">
    <aside class="sidebar">
      <ul class="sidebar-nav">
        <li><a href="dashboard.html" class="active"><span class="nav-icon">&#x1F4CA;</span><span>Dashboard</span></a></li>
        <li><a href="profile.html"><span class="nav-icon">&#x1F464;</span><span>Profile &amp; Settings</span></a></li>
        <li><a href="results.html"><span class="nav-icon">&#x1F4DD;</span><span>My Results</span></a></li>
        <li><a href="syllabus.html"><span class="nav-icon">&#x1F4DA;</span><span>Syllabus</span></a></li>
        <li><a href="notifications.html"><span class="nav-icon">&#x1F514;</span><span>Notifications</span></a></li>
        <li><a href="#" onclick="logout()"><span class="nav-icon">&#x1F6AA;</span><span>Logout</span></a></li>
      </ul>
    </aside>
    <main class="main-content">
      <div class="dashboard-header">
        <h1>Welcome back, <span id="student-name" style="color:var(--accent)"></span></h1>
        <p>Student Dashboard</p>
      </div>
      <div id="alert-container"></div>
      <div class="stats-row" id="stats-grid">
        <div class="stat-card reveal">
          <p class="stat-card-label">Total Exams</p>
          <p class="stat-card-value" id="stat-total">-</p>
        </div>
        <div class="stat-card reveal">
          <p class="stat-card-label">Completed</p>
          <p class="stat-card-value accent" id="stat-completed">-</p>
        </div>
        <div class="stat-card reveal">
          <p class="stat-card-label">Avg Score</p>
          <p class="stat-card-value" id="stat-avg">-</p>
        </div>
        <div class="stat-card reveal">
          <p class="stat-card-label">Pending</p>
          <p class="stat-card-value" id="stat-pending">-</p>
        </div>
      </div>
      <h2 style="margin-bottom:var(--space-4);font-size:var(--text-xl);">My Exams</h2>
      <div id="exam-list"></div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@microsoft/signalr@8.0.0/dist/browser/signalr.min.js"></script>
  <script src="../../js/api.js"></script>
  <script src="../../js/auth.js"></script>
  <script src="../../js/animations.js"></script>
  <script src="../../js/signalr-client.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      if (!requireRole('student')) return;
      const name = getUserName();
      if (name) document.getElementById('student-name').textContent = name;
      setupNavbar();
      await loadData();
      // Connect real-time updates
      const userId = getUserId();
      await realtime.connectDashboard('student', userId);
      realtime.on('ExamSubmitted', (data) => { loadData(); });
      realtime.on('ExamStatusChanged', (data) => { loadData(); });
      realtime.on('ExamActivated', (data) => { loadData(); });
      realtime.on('Disqualified', (data) => { loadData(); });
    });

    window.addEventListener('beforeunload', () => {
      realtime.disconnectAll();
    });

    async function loadData() {
      try {
        const [examRes, analyticsRes] = await Promise.all([
          api.get('/api/exams?page=1&limit=50'),
          api.get('/api/students/analytics/' + getUserId()).catch(() => null)
        ]);
        const exams = examRes.data || [];
        document.getElementById('stat-total').textContent = exams.length;
        const analytics = analyticsRes?.data;
        if (analytics) {
          document.getElementById('stat-completed').textContent = analytics.completed_exams || 0;
          document.getElementById('stat-avg').textContent = (analytics.average_score || 0) + '%';
          document.getElementById('stat-pending').textContent = analytics.pending_exams || 0;
        }
        const container = document.getElementById('exam-list');
        if (!exams.length) {
          container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">&#x1F4DA;</div><h3>No exams assigned yet</h3><p>Exams assigned to you will appear here.</p></div>';
          return;
        }
        container.innerHTML = '<div class="exam-grid">' + exams.map((e, i) => `
          <div class="exam-card reveal" onclick="goTo('exam.html?id=${e.id}')">
            <div class="exam-card-title">${e.title}</div>
            <div class="exam-card-meta">
              <span>&#x1F4D6; ${e.subject}</span>
              <span>&#x23F1; ${e.duration_minutes} min</span>
              ${statusBadge(e.status)}
            </div>
            <div class="exam-card-footer">
              <span style="color:var(--text-dim);font-size:0.85rem">${formatDate(e.created_at)}</span>
              <span class="btn btn-sm btn-primary">Start &#x2192;</span>
            </div>
          </div>
        `).join('') + '</div>';
      } catch (e) {
        document.getElementById('exam-list').innerHTML = `<div class="alert alert-red">${e.message}</div>`;
      }
    }
  </script>
  <script src="../../js/nav.js"></script>
</body>
</html>
