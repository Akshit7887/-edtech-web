<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notifications - EdTech AI Test &amp; Learning App</title>
  <link rel="stylesheet" href="../../css/main.css?v=2">
  <link rel="stylesheet" href="../../css/dashboard.css?v=2">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar">
    <div class="navbar-brand"><span class="brand-logo"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/><path d="M8 7h8"/><path d="M8 11h6"/></svg></span>EdTech AI Test &amp; Learning App</div>
    <button class="hamburger-btn" aria-label="Open navigation menu" aria-expanded="false" type="button"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="hamburger-icon"><line class="hamburger-line top" x1="3" y1="6" x2="21" y2="6"/><line class="hamburger-line mid" x1="3" y1="12" x2="21" y2="12"/><line class="hamburger-line bot" x1="3" y1="18" x2="21" y2="18"/></svg></button>
  </nav>
  <div class="layout">
    <aside class="sidebar">
      <ul class="sidebar-nav">
        <li><a href="dashboard.html"><span class="nav-icon">📊</span><span>Dashboard</span></a></li>
        <li><a href="results.html"><span class="nav-icon">📝</span><span>My Results</span></a></li>
        <li><a href="notifications.html" class="active"><span class="nav-icon">🔔</span><span>Notifications</span></a></li>
        <li><a href="profile.html"><span class="nav-icon">👤</span><span>Profile</span></a></li>
        <li><a href="#" onclick="logout()"><span class="nav-icon">🚪</span><span>Logout</span></a></li>
      </ul>
    </aside>
    <main class="main-content">
      <div class="dashboard-header" style="display:flex;justify-content:space-between;align-items:center" data-aos="fade-up">
        <div>
          <h1>Notifications</h1>
          <p>Stay updated with exam announcements</p>
        </div>
        <button class="btn btn-ghost btn-sm" onclick="markAllRead()">Mark All Read</button>
      </div>
      <div id="alert-container"></div>
      <div id="notifications-container" data-aos="fade-up" data-aos-delay="100"><div class="loading-overlay"><div class="spinner"></div><span>Loading notifications...</span></div></div>
    </main>
  </div>
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script>AOS.init({ once: true });</script>
  <script src="https://cdn.jsdelivr.net/npm/@microsoft/signalr@8.0.0/dist/browser/signalr.min.js"></script>
  <script src="../../js/api.js"></script>
  <script src="../../js/auth.js"></script>
  <script src="../../js/signalr-client.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      if (!requireRole('student')) return;
      setupNavbar();
      await loadNotifications();
      const userId = getUserId();
      await realtime.connectNotifications(userId);
      realtime.on('NewNotification', (data) => {
        showAlert(data.title || 'New notification', 'success');
        loadNotifications();
      });
    });

    async function loadNotifications() {
      try {
        const res = await api.get('/api/students/notifications?page=1&limit=50');
        const items = (res.data && res.data.notifications) || [];
        const container = document.getElementById('notifications-container');
        if (!items.length) {
          container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🔔</div><h3>No notifications</h3><p>You\'re all caught up!</p></div>';
          return;
        }
        container.innerHTML = items.map((n, i) => `
          <div class="card notification-card animate-fade-up" style="animation-delay:${i * 0.03}s;${n.is_read ? '' : 'border-left:3px solid var(--primary)'}" onclick="markRead(${n.id}, this)">
            <div style="display:flex;justify-content:space-between;align-items:flex-start">
              <div>
                <h4 style="font-size:0.95rem;margin-bottom:4px">${n.title}</h4>
                <p style="color:var(--text-muted);font-size:0.85rem">${n.message}</p>
              </div>
              <div style="text-align:right;flex-shrink:0">
                <span class="badge ${n.type === 'exam' ? 'badge-primary' : n.type === 'result' ? 'badge-success' : 'badge-info'}">${n.type}</span>
                <div style="color:var(--text-dim);font-size:0.75rem;margin-top:4px">${formatDate(n.created_at)}</div>
              </div>
            </div>
          </div>
        `).join('');
      } catch (e) {
        document.getElementById('notifications-container').innerHTML = `<div class="alert alert-error">${e.message}</div>`;
      }
    }

    async function markRead(id, el) {
      try {
        await api.put(`/api/students/notifications/${id}/read`);
        el.style.borderLeft = 'none';
      } catch (e) {}
    }

    async function markAllRead() {
      try {
        await api.put('/api/students/notifications/read-all');
        document.querySelectorAll('.card.notification-card').forEach(el => el.style.borderLeft = 'none');
        showAlert('All notifications marked as read', 'success');
      } catch (e) {
        showAlert(e.message, 'error');
      }
    }
  </script>
  <script src="../../js/nav.js"></script>
</body>
</html>
