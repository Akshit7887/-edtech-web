<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile - EdTech</title>
  <link rel="stylesheet" href="../../css/main.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <nav class="navbar">
    <div class="navbar-brand">📚 EdTech</div>
    <ul class="navbar-nav">
      <li><a href="dashboard.html">Dashboard</a></li>
      <li><a href="results.html">My Results</a></li>
      <li><a href="notifications.html">Notifications</a></li>
      <li><a href="profile.html" class="active">Profile</a></li>
      <!-- USER -->
    </ul>
  </nav>
  <div class="layout">
    <aside class="sidebar">
      <ul class="sidebar-nav">
        <li><a href="dashboard.html"><span class="nav-icon">📊</span><span>Dashboard</span></a></li>
        <li><a href="results.html"><span class="nav-icon">📝</span><span>My Results</span></a></li>
        <li><a href="notifications.html"><span class="nav-icon">🔔</span><span>Notifications</span></a></li>
        <li><a href="profile.html" class="active"><span class="nav-icon">👤</span><span>Profile</span></a></li>
        <li><a href="#" onclick="logout()"><span class="nav-icon">🚪</span><span>Logout</span></a></li>
      </ul>
    </aside>
    <main class="main-content">
      <div class="dashboard-header">
        <h1>My Profile</h1>
        <p>Manage your account settings</p>
      </div>
      <div id="alert-container"></div>
      <div class="row">
        <div class="col-2">
          <div class="card" style="margin-bottom:20px">
            <div class="card-header"><h3 class="card-title">Profile Information</h3></div>
            <div class="card-body">
              <div class="form-group">
                <label class="form-label">Name</label>
                <input type="text" class="form-input" id="profile-name">
              </div>
              <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" class="form-input" id="profile-email">
              </div>
              <div class="form-group">
                <label class="form-label">Phone</label>
                <input type="tel" class="form-input" id="profile-phone">
              </div>
              <button class="btn btn-primary" onclick="saveProfile()">Save Changes</button>
            </div>
          </div>
        </div>
        <div class="col-2">
          <div class="card">
            <div class="card-header"><h3 class="card-title">Change Password</h3></div>
            <div class="card-body">
              <div class="form-group">
                <label class="form-label">Current Password</label>
                <input type="password" class="form-input" id="current-password">
              </div>
              <div class="form-group">
                <label class="form-label">New Password</label>
                <input type="password" class="form-input" id="new-password" minlength="6">
              </div>
              <button class="btn btn-warning" onclick="changePwd()">Update Password</button>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
  <script src="../../js/api.js"></script>
  <script src="../../js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (!requireRole('student')) return;
      setupNavbar();
      const user = getUser();
      if (user) {
        document.getElementById('profile-name').value = user.name || '';
        document.getElementById('profile-email').value = user.email || '';
        document.getElementById('profile-phone').value = user.phone || '';
      }
    });

    async function saveProfile() {
      clearAlerts();
      const data = {
        name: document.getElementById('profile-name').value.trim(),
        email: document.getElementById('profile-email').value.trim(),
        phone: document.getElementById('profile-phone').value.trim()
      };
      try {
        const result = await updateProfile(data);
        const user = getUser();
        if (user) { user.name = data.name; user.email = data.email; user.phone = data.phone; localStorage.setItem('user', JSON.stringify(user)); localStorage.setItem('user_name', data.name); }
        showAlert('Profile updated successfully', 'success');
      } catch (e) { showAlert(e.message, 'error'); }
    }

    async function changePwd() {
      clearAlerts();
      const current = document.getElementById('current-password').value;
      const newPwd = document.getElementById('new-password').value;
      if (!current || !newPwd) { showAlert('Fill all fields', 'error'); return; }
      if (newPwd.length < 6) { showAlert('New password must be at least 6 characters', 'error'); return; }
      try {
        await changePassword(current, newPwd);
        showAlert('Password changed successfully', 'success');
        document.getElementById('current-password').value = '';
        document.getElementById('new-password').value = '';
      } catch (e) { showAlert(e.message, 'error'); }
    }
  </script>
</body>
</html>
