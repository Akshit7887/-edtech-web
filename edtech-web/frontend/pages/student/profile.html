<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile - EdTech AI Test &amp; Learning App</title>
  <link rel="stylesheet" href="../../css/main.css">
  <link rel="stylesheet" href="../../css/dashboard.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar">
    <div class="navbar-brand"><span class="brand-logo"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/><path d="M8 7h8"/><path d="M8 11h6"/></svg></span>EdTech AI Test &amp; Learning App</div>
    <button class="hamburger-btn" aria-label="Open navigation menu" aria-expanded="false" type="button"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="hamburger-icon"><line class="hamburger-line top" x1="3" y1="6" x2="21" y2="6"/><line class="hamburger-line mid" x1="3" y1="12" x2="21" y2="12"/><line class="hamburger-line bot" x1="3" y1="18" x2="21" y2="18"/></svg></button>
  </nav>
  <div class="layout">
    <aside class="sidebar">
      <ul class="sidebar-nav">
        <li><a href="dashboard.html"><span class="nav-icon">📊</span><span>Dashboard</span></a></li>
        <li><a href="results.html"><span class="nav-icon">📝</span><span>My Results</span></a></li>
        <li><a href="notifications.html"><span class="nav-icon">🔔</span><span>Notifications</span></a></li>
        <li><a href="profile.html" class="active"><span class="nav-icon">👤</span><span>Profile</span></a></li>
        <li><a href="#" onclick="logout()"><span class="nav-icon">🚪</span><span>Logout</span></a></li>
      </ul>
    </aside>
    <main class="main-content">
      <div id="alert-container"></div>

      <div class="page-header" data-aos="fade-up">
        <div style="display:flex;align-items:center;gap:var(--space-5)">
          <div class="profile-avatar" id="profile-avatar">?</div>
          <div>
            <h1 id="profile-display-name">My Profile</h1>
            <p style="color:var(--text-muted);font-size:var(--text-sm)">Manage your account settings</p>
          </div>
        </div>
      </div>

      <div class="row" data-aos="fade-up" data-aos-delay="100">
        <div class="col-2">
          <div class="card">
            <div class="card-header">
              <h3 class="card-title">Profile Information</h3>
            </div>
            <div class="card-body" style="display:flex;flex-direction:column;gap:var(--space-5)">
              <div class="form-group form-floating">
                <input type="text" class="form-input" id="profile-name" placeholder=" ">
                <label class="form-label">Full Name</label>
              </div>
              <div class="form-group form-floating">
                <input type="email" class="form-input" id="profile-email" placeholder=" ">
                <label class="form-label">Email Address</label>
              </div>
              <div class="form-group form-floating">
                <input type="tel" class="form-input" id="profile-phone" placeholder=" ">
                <label class="form-label">Phone Number</label>
              </div>
              <div style="display:flex;gap:var(--space-3)">
                <button class="btn btn-primary" id="save-btn" onclick="saveProfile()">
                  <span id="save-text">Save Changes</span>
                  <span id="save-spinner" class="spinner spinner-sm" style="display:none"></span>
                </button>
                <button class="btn btn-secondary" onclick="resetForm()">Reset</button>
              </div>
            </div>
          </div>
        </div>
        <div class="col-2">
          <div class="card">
            <div class="card-header">
              <h3 class="card-title">Change Password</h3>
            </div>
            <div class="card-body" style="display:flex;flex-direction:column;gap:var(--space-5)">
              <div class="form-group form-floating">
                <input type="password" class="form-input" id="current-password" placeholder=" ">
                <label class="form-label">Current Password</label>
              </div>
              <div class="form-group form-floating">
                <input type="password" class="form-input" id="new-password" minlength="6" placeholder=" ">
                <label class="form-label">New Password (min 6 chars)</label>
              </div>
              <button class="btn btn-warning" id="pwd-btn" onclick="changePwd()">
                <span id="pwd-text">Update Password</span>
                <span id="pwd-spinner" class="spinner spinner-sm" style="display:none"></span>
              </button>
            </div>
          </div>

          <div class="card" style="margin-top:var(--space-6)">
            <div class="card-header">
              <h3 class="card-title">Account Info</h3>
            </div>
            <div class="card-body" style="display:flex;flex-direction:column;gap:var(--space-3)">
              <div style="display:flex;justify-content:space-between;padding:var(--space-2) 0;border-bottom:1px solid var(--border-light)">
                <span style="color:var(--text-muted);font-size:var(--text-sm)">Role</span>
                <span class="user-badge" id="profile-role">Student</span>
              </div>
              <div style="display:flex;justify-content:space-between;padding:var(--space-2) 0;border-bottom:1px solid var(--border-light)">
                <span style="color:var(--text-muted);font-size:var(--text-sm)">User ID</span>
                <span style="font-size:var(--text-sm);font-family:var(--font-mono)" id="profile-id">-</span>
              </div>
              <div style="display:flex;justify-content:space-between;padding:var(--space-2) 0">
                <span style="color:var(--text-muted);font-size:var(--text-sm)">Account</span>
                <span style="font-size:var(--text-sm);color:var(--success)">Active</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script>AOS.init({ once: true });</script>
  <script src="../../js/api.js"></script>
  <script src="../../js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (!requireRole('student')) return;
      setupNavbar();
      loadProfile();
    });

    function loadProfile() {
      const user = getUser();
      if (!user) return;
      document.getElementById('profile-display-name').textContent = user.name || 'My Profile';
      document.getElementById('profile-name').value = user.name || '';
      document.getElementById('profile-email').value = user.email || '';
      document.getElementById('profile-phone').value = user.phone || '';
      document.getElementById('profile-role').textContent = user.role ? user.role.charAt(0).toUpperCase() + user.role.slice(1) : 'Student';
      document.getElementById('profile-id').textContent = user.id || '-';

      const avatar = document.getElementById('profile-avatar');
      if (user.name) {
        avatar.textContent = user.name.charAt(0).toUpperCase();
      }
    }

    function resetForm() {
      loadProfile();
      clearAlerts();
    }

    async function saveProfile() {
      clearAlerts();
      const data = {
        name: document.getElementById('profile-name').value.trim(),
        email: document.getElementById('profile-email').value.trim(),
        phone: document.getElementById('profile-phone').value.trim()
      };
      if (!data.name) { showAlert('Name is required', 'error'); return; }
      if (!data.email) { showAlert('Email is required', 'error'); return; }

      const btn = document.getElementById('save-btn');
      const text = document.getElementById('save-text');
      const spinner = document.getElementById('save-spinner');
      btn.disabled = true; text.textContent = 'Saving...'; spinner.style.display = 'inline-block';

      try {
        await updateProfile(data);
        const user = getUser();
        if (user) {
          user.name = data.name; user.email = data.email; user.phone = data.phone;
          localStorage.setItem('user', JSON.stringify(user));
          localStorage.setItem('user_name', data.name);
        }
        loadProfile();
        showAlert('Profile updated successfully', 'success');
      } catch (e) {
        showAlert(e.message, 'error');
      } finally {
        btn.disabled = false; text.textContent = 'Save Changes'; spinner.style.display = 'none';
      }
    }

    async function changePwd() {
      clearAlerts();
      const current = document.getElementById('current-password').value;
      const newPwd = document.getElementById('new-password').value;
      if (!current || !newPwd) { showAlert('Fill all fields', 'error'); return; }
      if (newPwd.length < 6) { showAlert('New password must be at least 6 characters', 'error'); return; }

      const btn = document.getElementById('pwd-btn');
      const text = document.getElementById('pwd-text');
      const spinner = document.getElementById('pwd-spinner');
      btn.disabled = true; text.textContent = 'Updating...'; spinner.style.display = 'inline-block';

      try {
        await changePassword(current, newPwd);
        showAlert('Password changed successfully', 'success');
        document.getElementById('current-password').value = '';
        document.getElementById('new-password').value = '';
      } catch (e) {
        showAlert(e.message, 'error');
      } finally {
        btn.disabled = false; text.textContent = 'Update Password'; spinner.style.display = 'none';
      }
    }
  </script>
  <script src="../../js/nav.js"></script>
</body>
</html>
