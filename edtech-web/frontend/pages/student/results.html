<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Results - EdTech AI Test &amp; Learning App</title>
  <link rel="stylesheet" href="../../css/main.css">
  <link rel="stylesheet" href="../../css/dashboard.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar">
    <div class="navbar-brand"><span class="brand-logo"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/><path d="M8 7h8"/><path d="M8 11h6"/></svg></span>EdTech AI Test &amp; Learning App</div>
    <button class="hamburger-btn" aria-label="Open navigation menu" aria-expanded="false" type="button"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="hamburger-icon"><line class="hamburger-line top" x1="3" y1="6" x2="21" y2="6"/><line class="hamburger-line mid" x1="3" y1="12" x2="21" y2="12"/><line class="hamburger-line bot" x1="3" y1="18" x2="21" y2="18"/></svg></button>
  </nav>
  <div class="layout">
    <aside class="sidebar">
      <ul class="sidebar-nav">
        <li><a href="dashboard.html"><span class="nav-icon">📊</span><span>Dashboard</span></a></li>
        <li><a href="results.html" class="active"><span class="nav-icon">📝</span><span>My Results</span></a></li>
        <li><a href="notifications.html"><span class="nav-icon">🔔</span><span>Notifications</span></a></li>
        <li><a href="profile.html"><span class="nav-icon">👤</span><span>Profile</span></a></li>
        <li><a href="#" onclick="logout()"><span class="nav-icon">🚪</span><span>Logout</span></a></li>
      </ul>
    </aside>
    <main class="main-content">
      <div class="dashboard-header" data-aos="fade-up">
        <h1>My Results</h1>
        <p>View your exam history and performance</p>
      </div>
      <div id="alert-container"></div>
      <div class="table-container" id="results-container" data-aos="fade-up" data-aos-delay="100">
        <div class="loading-overlay"><div class="spinner"></div><span>Loading results...</span></div>
      </div>
    </main>
  </div>
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
  <script>
    AOS.init({ once: true });
  </script>
  <script src="../../js/api.js"></script>
  <script src="../../js/auth.js"></script>
  <script src="../../js/exam.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      if (!requireRole('student')) return;
      setupNavbar();
      await loadResults();
      const justCompleted = sessionStorage.getItem('exam_just_completed');
      if (justCompleted === 'true') {
        sessionStorage.removeItem('exam_just_completed');
        triggerConfetti();
      }
    });

    function triggerConfetti() {
      const duration = 4000;
      const end = Date.now() + duration;
        const colors = ['#b91c1c', '#dc2626', '#ef4444', '#991b1b', '#7f1d1d'];
      (function frame() {
        confetti({ particleCount: 4, angle: 60, spread: 55, origin: { x: 0, y: 0.6 }, colors });
        confetti({ particleCount: 4, angle: 120, spread: 55, origin: { x: 1, y: 0.6 }, colors });
        if (Date.now() < end) requestAnimationFrame(frame);
      })();
      setTimeout(() => {
        confetti({ particleCount: 100, spread: 100, origin: { y: 0.6 }, colors });
      }, 500);
    }

    function animateValue(el, start, end, duration, suffix) {
      const startTime = performance.now();
      function update(now) {
        const progress = Math.min((now - startTime) / duration, 1);
        const eased = 1 - Math.pow(1 - progress, 3);
        const current = start + (end - start) * eased;
        el.textContent = Math.round(current) + (suffix || '');
        if (progress < 1) requestAnimationFrame(update);
      }
      requestAnimationFrame(update);
    }

    async function loadResults() {
      try {
        const results = await loadMyResults();
        const container = document.getElementById('results-container');
        if (!results || !results.length) {
          container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📝</div><h3>No results yet</h3><p>Complete an exam to see your results here.</p></div>';
          return;
        }
        const passCount = results.filter(r => r.status === 'completed' && r.score >= r.total_questions * 0.4).length;
        container.innerHTML = `
          <table>
            <thead><tr>
              <th>Exam</th><th>Subject</th><th>Score</th><th>Total</th><th>Percentage</th><th>Status</th><th>Submitted</th><th>Time</th><th>Action</th>
            </tr></thead>
            <tbody>
              ${results.map((r, i) => `
                <tr class="${r.status === 'completed' ? (r.score >= r.total_questions * 0.4 ? 'row-high-pass' : 'row-high-fail') : ''}" style="animation:fadeInUp 0.3s var(--ease) both;animation-delay:${i * 0.03}s">
                  <td><strong>${r.exam_title}</strong></td>
                  <td>${r.subject || '-'}</td>
                  <td><span class="score-value">${r.score ?? '-'}</span></td>
                  <td>${r.total_questions || '-'}</td>
                  <td>${r.total_questions ? `<span class="badge ${(r.score / r.total_questions) >= 0.4 ? 'badge-success' : 'badge-danger'}">${((r.score / r.total_questions) * 100).toFixed(1)}%</span>` : '-'}</td>
                  <td>${statusBadge(r.status)}</td>
                  <td>${formatDate(r.submitted_at)}</td>
                  <td>${r.time_used ? r.time_used + 's' : '-'}</td>
                  <td>
                    ${r.status === 'completed' ? `<button class="btn btn-sm btn-primary" onclick="goTo('review.html?session=${r.session_id}')">Review</button>` : '-'}
                  </td>
                </tr>
              `).join('')}
            </tbody>
          </table>
          ${passCount > 0 ? '<div style="margin-top:16px;text-align:center"><button class="btn btn-primary" onclick="triggerConfetti()">🎉 Celebrate!</button></div>' : ''}
        `;
       } catch (e) {
        document.getElementById('results-container').innerHTML = `<div class="alert alert-red">${e.message}</div>`;
       }
    }
  </script>
  <script src="../../js/nav.js"></script>
</body>
</html>
