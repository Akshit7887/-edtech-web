<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Classes - EdTech AI Test &amp; Learning App</title>
  <link rel="stylesheet" href="../../css/main.css?v=2">
  <link rel="stylesheet" href="../../css/dashboard.css?v=2">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar">
    <div class="navbar-brand"><span class="brand-logo"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/><path d="M8 7h8"/><path d="M8 11h6"/></svg></span>EdTech AI Test &amp; Learning App</div>
    <button class="hamburger-btn" aria-label="Open navigation menu" aria-expanded="false" type="button"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="hamburger-icon"><line class="hamburger-line top" x1="3" y1="6" x2="21" y2="6"/><line class="hamburger-line mid" x1="3" y1="12" x2="21" y2="12"/><line class="hamburger-line bot" x1="3" y1="18" x2="21" y2="18"/></svg></button>
  </nav>
  <div class="layout">
    <aside class="sidebar">
      <ul class="sidebar-nav">
        <li><a href="dashboard.html"><span class="nav-icon">📊</span><span>Dashboard</span></a></li>
        <li><a href="students.html"><span class="nav-icon">👥</span><span>Students</span></a></li>
        <li><a href="classes.html" class="active"><span class="nav-icon">🏫</span><span>Classes</span></a></li>
        <li><a href="parent-contacts.html"><span class="nav-icon">👪</span><span>Parent Contacts</span></a></li>
        <li><a href="#" onclick="logout()"><span class="nav-icon">🚪</span><span>Logout</span></a></li>
      </ul>
    </aside>
    <main class="main-content">
      <div class="dashboard-header" style="display:flex;justify-content:space-between;align-items:center" data-aos="fade-up">
        <div><h1>Classes</h1><p>Organize students into classes</p></div>
        <button class="btn btn-primary" onclick="showCreateClassModal()">+ New Class</button>
      </div>
      <div id="alert-container"></div>
      <div id="classes-container" data-aos="fade-up" data-aos-delay="100"><div class="loading-overlay"><div class="spinner"></div><span>Loading classes...</span></div></div>
    </main>
  </div>
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script>AOS.init({ once: true });</script>
  <script src="../../js/api.js"></script>
  <script src="../../js/auth.js"></script>
  <script src="../../js/teacher.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      if (!requireRole('teacher')) return;
      setupNavbar();
      await loadClassesList();
    });

    async function loadClassesList() {
      try {
        const classes = await loadClasses();
        const container = document.getElementById('classes-container');
        if (!classes.length) {
          container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🏫</div><h3>No classes yet</h3><p>Create your first class to organize students.</p></div>';
          return;
        }
        container.innerHTML = '<div class="exam-grid">' + classes.map((c, i) => `
          <div class="exam-card animate-fade-up" style="animation-delay:${i * 0.05}s">
            <div class="exam-card-title">${c.name}</div>
            <div class="exam-card-meta">
              <span>📖 ${c.subject || 'General'}</span>
              <span>👥 ${c.student_count || 0} students</span>
            </div>
            <p style="color:var(--text-muted);font-size:0.85rem;margin-bottom:12px">${c.description || ''}</p>
            <div class="exam-card-footer">
              <span style="color:var(--text-dim);font-size:0.85rem">${formatDate(c.created_at)}</span>
              <div style="display:flex;gap:4px">
                <button class="btn btn-sm btn-secondary" onclick="showAddStudentsModal(${c.id})">+ Add Students</button>
                <button class="btn btn-sm btn-outline" onclick="viewClassDetail(${c.id})">View</button>
                <button class="btn btn-sm btn-danger" onclick="handleDeleteClass(${c.id})">Delete</button>
              </div>
            </div>
          </div>
        `).join('') + '</div>';
      } catch (e) {
        document.getElementById('classes-container').innerHTML = `<div class="alert alert-error">${e.message}</div>`;
      }
    }

    function showCreateClassModal() {
      const html = `
        <div class="form-group form-floating"><input class="form-input" id="cls-name" placeholder=" "><label class="form-label">Class Name</label></div>
        <div class="form-group form-floating"><input class="form-input" id="cls-subject" placeholder=" "><label class="form-label">Subject</label></div>
        <div class="form-group form-floating"><textarea class="form-textarea" id="cls-desc" placeholder=" " style="min-height:60px"></textarea><label class="form-label">Description</label></div>
      `;
      const overlay = document.createElement('div'); overlay.className = 'modal-overlay active'; overlay.id = 'cls-modal';
      overlay.innerHTML = `
        <div class="modal"><div class="modal-header"><h3>Create Class</h3><button class="modal-close" onclick="closeClsModal()">×</button></div>
        <div class="modal-body">${html}</div>
        <div class="modal-footer"><button class="btn btn-secondary" onclick="closeClsModal()">Cancel</button><button class="btn btn-primary" onclick="handleCreateClass()">Create</button></div></div>
      `;
      document.body.appendChild(overlay);
    }

    function closeClsModal() { const m = document.getElementById('cls-modal'); if (m) m.remove(); }
    function closeStModal() { const m = document.getElementById('st-modal'); if (m) m.remove(); }

    async function handleCreateClass() {
      const data = {
        name: document.getElementById('cls-name').value.trim(),
        subject: document.getElementById('cls-subject').value.trim() || null,
        description: document.getElementById('cls-desc').value.trim() || null
      };
      if (!data.name) { showAlert('Class name required', 'error'); return; }
      try { await createClass(data); showAlert('Class created!', 'success'); closeClsModal(); await loadClassesList(); } catch (e) { showAlert(e.message, 'error'); }
    }

    function showAddStudentsModal(classId) {
      window._stClassId = classId;
      window._stAdded = [];
      const overlay = document.createElement('div'); overlay.className = 'modal-overlay active'; overlay.id = 'st-modal';
      overlay.innerHTML = `
        <div class="modal" style="max-width:500px"><div class="modal-header"><h3>Add Students to Class</h3><button class="modal-close" onclick="closeStModal()">×</button></div>
        <div class="modal-body">
          <p style="color:var(--text-muted);font-size:0.85rem;margin-bottom:12px">Search by 10-digit student ID</p>
          <div style="display:flex;gap:8px">
            <div class="form-group form-floating" style="flex:1">
              <input class="form-input" id="st-search-input" placeholder=" " onkeydown="if(event.key==='Enter')searchStudent()">
              <label class="form-label">Student ID</label>
            </div>
            <button class="btn btn-primary" style="white-space:nowrap" onclick="searchStudent()">Search</button>
          </div>
          <div id="st-search-result" style="margin-top:12px"></div>
          <div id="st-added-list" style="margin-top:12px"></div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" onclick="closeStModal()">Done</button>
        </div></div>
      `;
      document.body.appendChild(overlay);
      document.getElementById('st-search-input').focus();
    }

    async function searchStudent() {
      const sid = document.getElementById('st-search-input').value.trim();
      if (!sid) { showAlert('Enter a student ID', 'error'); return; }
      try {
        const student = await searchStudentBySid(sid);
        if (window._stAdded.some(s => s.id === student.id)) {
          document.getElementById('st-search-result').innerHTML = '<div class="alert alert-info">Already added</div>'; return;
        }
        document.getElementById('st-search-result').innerHTML = `
          <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:var(--surface);border-radius:8px;border:1px solid var(--border);margin-bottom:8px">
            <div><strong>${escHtml(student.name)}</strong><br><span style="color:var(--text-muted);font-size:0.85rem">ID: ${student.student_id} | ${escHtml(student.email||'')}</span></div>
            <button class="btn btn-sm btn-primary" onclick="addFoundStudent()">+ Add</button>
          </div>
        `;
        window._stFound = student;
      } catch (e) {
        document.getElementById('st-search-result').innerHTML = '<div class="alert alert-error">' + escHtml(e.message) + '</div>';
      }
    }

    function addFoundStudent() {
      const student = window._stFound;
      if (!student) return;
      window._stAdded.push(student);
      window._stFound = null;
      document.getElementById('st-search-input').value = '';
      document.getElementById('st-search-result').innerHTML = '';
      renderAddedStudents();
    }

    function renderAddedStudents() {
      const list = document.getElementById('st-added-list');
      if (!list) return;
      const students = window._stAdded || [];
      if (!students.length) { list.innerHTML = ''; return; }
      list.innerHTML = '<p style="color:var(--text-muted);font-size:0.85rem;margin-bottom:6px">Students to add:</p>' +
        students.map((s, i) => `
          <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 10px;background:var(--surface);border-radius:6px;border:1px solid var(--border);margin-bottom:4px">
            <span>${escHtml(s.name)} <span style="color:var(--text-muted);font-size:0.8rem">(${s.student_id})</span></span>
            <button class="btn btn-sm btn-danger" onclick="removeAddedStudent(${i})">×</button>
          </div>
        `).join('') +
        '<button class="btn btn-sm btn-primary" style="margin-top:8px" onclick="confirmAddStudents()">Save All</button>';
    }

    function removeAddedStudent(idx) {
      window._stAdded.splice(idx, 1);
      renderAddedStudents();
    }

    async function confirmAddStudents() {
      const ids = window._stAdded.map(s => s.id);
      if (!ids.length) { showAlert('No students to add', 'error'); return; }
      try {
        await addStudentsToClass(window._stClassId, ids);
        showAlert('Students added!', 'success');
        closeStModal();
        await loadClassesList();
      } catch (e) { showAlert(e.message, 'error'); }
    }

    async function viewClassDetail(classId) {
      try {
        const res = await api.get('/api/teacher/classes/' + classId);
        const cls = res.data;
        const overlay = document.createElement('div'); overlay.className = 'modal-overlay active'; overlay.id = 'detail-modal';
        overlay.innerHTML = `
          <div class="modal" style="max-width:600px"><div class="modal-header"><h3>${escHtml(cls.name)}</h3><button class="modal-close" onclick="document.getElementById('detail-modal').remove()">×</button></div>
          <div class="modal-body">
            <p style="color:var(--text-muted);margin-bottom:12px">${escHtml(cls.subject||'General')} · ${cls.student_count} student(s)</p>
            <p style="margin-bottom:16px">${escHtml(cls.description)||'<span style="color:var(--text-muted)">No description</span>'}</p>
            <h4 style="margin-bottom:8px">Students</h4>
            ${cls.students && cls.students.length ? `
              <div style="max-height:300px;overflow-y:auto">
                <table class="data-table" style="width:100%">
                  <thead><tr><th>Name</th><th>Student ID</th><th>Email</th><th></th></tr></thead>
                  <tbody>
                    ${cls.students.map(s => `
                      <tr>
                        <td>${escHtml(s.name)}</td>
                        <td style="font-family:mono">${s.student_id||'-'}</td>
                        <td>${escHtml(s.email||'')}</td>
                        <td><button class="btn btn-sm btn-danger" onclick="handleRemoveStudentFromClass(${classId},${s.id})">Remove</button></td>
                      </tr>
                    `).join('')}
                  </tbody>
                </table>
              </div>
            ` : '<p style="color:var(--text-muted)">No students in this class yet</p>'}
          </div>
          <div class="modal-footer"><button class="btn btn-secondary" onclick="document.getElementById('detail-modal').remove()">Close</button></div></div>
        `;
        document.body.appendChild(overlay);
      } catch (e) { showAlert(e.message, 'error'); }
    }

    async function handleRemoveStudentFromClass(classId, studentId) {
      if (!await confirmAction('Remove this student from the class?')) return;
      try {
        await removeStudentFromClass(classId, studentId);
        showAlert('Student removed', 'success');
        const m = document.getElementById('detail-modal'); if (m) m.remove();
        await loadClassesList();
      } catch (e) { showAlert(e.message, 'error'); }
    }

    async function handleDeleteClass(id) {
      if (!await confirmAction('Delete this class?')) return;
      try { await deleteClass(id); showAlert('Class deleted', 'success'); await loadClassesList(); } catch (e) { showAlert(e.message, 'error'); }
    }

    function escHtml(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
  </script>
  <script src="../../js/nav.js"></script>
</body>
</html>
