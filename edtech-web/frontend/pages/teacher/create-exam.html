<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Exam - EdTech AI Test &amp; Learning App</title>
  <link rel="stylesheet" href="../../css/main.css?v=2">
  <link rel="stylesheet" href="../../css/dashboard.css?v=2">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar">
    <div class="navbar-brand"><span class="brand-logo"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/><path d="M8 7h8"/><path d="M8 11h6"/></svg></span>EdTech AI Test &amp; Learning App</div>
    <button class="hamburger-btn" aria-label="Open navigation menu" aria-expanded="false" type="button"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="hamburger-icon"><line class="hamburger-line top" x1="3" y1="6" x2="21" y2="6"/><line class="hamburger-line mid" x1="3" y1="12" x2="21" y2="12"/><line class="hamburger-line bot" x1="3" y1="18" x2="21" y2="18"/></svg></button>
  </nav>
  <div class="layout">
    <aside class="sidebar">
      <ul class="sidebar-nav">
        <li><a href="dashboard.html"><span class="nav-icon">📊</span><span>Dashboard</span></a></li>
        <li><a href="create-exam.html" class="active"><span class="nav-icon">➕</span><span>Create Exam</span></a></li>
        <li><a href="students.html"><span class="nav-icon">👥</span><span>Students</span></a></li>
        <li><a href="classes.html"><span class="nav-icon">🏫</span><span>Classes</span></a></li>
        <li><a href="parent-contacts.html"><span class="nav-icon">👪</span><span>Parent Contacts</span></a></li>
        <li><a href="#" onclick="logout()"><span class="nav-icon">🚪</span><span>Logout</span></a></li>
      </ul>
    </aside>
    <main class="main-content">
      <div class="dashboard-header" data-aos="fade-up">
        <h1>Create Exam</h1>
        <p>Create manually or generate with AI</p>
      </div>
      <div id="alert-container"></div>
      <div class="tabs" data-aos="fade-up" data-aos-delay="100">
        <button class="tab active" onclick="switchTab('manual', this)">Manual</button>
        <button class="tab" onclick="switchTab('ai', this)">AI Generate</button>
      </div>
      <div id="tab-manual" data-aos="fade-up" data-aos-delay="150">
        <div class="card">
          <div class="card-header"><h3 class="card-title">Exam Details</h3></div>
          <div class="card-body">
            <div class="row">
              <div class="col-2">
                <div class="form-group form-floating">
                  <input type="text" class="form-input" id="exam-title" placeholder=" " required>
                  <label class="form-label">Title *</label>
                </div>
              </div>
              <div class="col-2">
                <div class="form-group form-floating">
                  <input type="text" class="form-input" id="exam-subject" placeholder=" " required>
                  <label class="form-label">Subject *</label>
                </div>
              </div>
            </div>
            <div class="form-group form-floating">
              <textarea class="form-textarea" id="exam-syllabus" placeholder=" " style="min-height:80px"></textarea>
              <label class="form-label">Syllabus Text</label>
            </div>
            <div class="row">
              <div class="col-3">
                <div class="form-group form-floating">
                  <input type="number" class="form-input" id="exam-duration" value="30" min="1" placeholder=" ">
                  <label class="form-label">Duration (minutes) *</label>
                </div>
              </div>
              <div class="col-3">
                <div class="form-group form-floating">
                  <input type="number" class="form-input" id="exam-questions" value="10" min="1" placeholder=" ">
                  <label class="form-label">Total Questions *</label>
                </div>
              </div>
              <div class="col-3">
                <div class="form-group">
                  <label class="form-label">Status</label>
                  <select class="form-select" id="exam-status">
                    <option value="draft">Draft</option>
                    <option value="active">Active</option>
                  </select>
                </div>
              </div>
            </div>
            <button class="btn btn-primary btn-lg" onclick="handleCreateExam()">Create Exam</button>
          </div>
        </div>
      </div>
      <div id="tab-ai" style="display:none" data-aos="fade-up" data-aos-delay="150">
        <div class="card">
          <div class="card-header"><h3 class="card-title">AI Generate Exam</h3></div>
          <div class="card-body">
            <div class="row">
              <div class="col-2">
                <div class="form-group form-floating">
                  <input type="text" class="form-input" id="ai-subject" placeholder=" " required>
                  <label class="form-label">Subject *</label>
                </div>
              </div>
              <div class="col-2">
                <div class="form-group form-floating">
                  <input type="text" class="form-input" id="ai-topic" placeholder=" " required>
                  <label class="form-label">Topic *</label>
                </div>
              </div>
            </div>
            <div class="row">
              <div class="col-3">
                <div class="form-group">
                  <label class="form-label">Question Count</label>
                  <input type="number" class="form-input" id="ai-count" value="10" min="1" max="50">
                </div>
              </div>
              <div class="col-3">
                <div class="form-group">
                  <label class="form-label">Difficulty</label>
                  <select class="form-select" id="ai-difficulty">
                    <option value="easy">Easy</option>
                    <option value="medium" selected>Medium</option>
                    <option value="hard">Hard</option>
                  </select>
                </div>
              </div>
            </div>
            <button class="btn btn-primary btn-lg" onclick="handleAiCreate()">Generate with AI</button>
          </div>
        </div>
      </div>
    </main>
  </div>
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script>AOS.init({ once: true });</script>
  <script src="../../js/api.js"></script>
  <script src="../../js/auth.js"></script>
  <script src="../../js/teacher.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => { if (!requireRole('teacher')) return; setupNavbar(); });

    function switchTab(tab, el) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
      document.getElementById('tab-manual').style.display = tab === 'manual' ? 'block' : 'none';
      document.getElementById('tab-ai').style.display = tab === 'ai' ? 'block' : 'none';
    }

    async function handleCreateExam() {
      clearAlerts();
      const data = {
        title: document.getElementById('exam-title').value.trim(),
        subject: document.getElementById('exam-subject').value.trim(),
        syllabus_text: document.getElementById('exam-syllabus').value.trim() || null,
        duration_minutes: parseInt(document.getElementById('exam-duration').value) || 30,
        total_questions: parseInt(document.getElementById('exam-questions').value) || 10,
        status: document.getElementById('exam-status').value
      };
      if (!data.title || !data.subject) { showAlert('Title and subject are required', 'error'); return; }
      try {
        await createExam(data);
        showAlert('Exam created successfully!', 'success');
        setTimeout(() => goTo('dashboard.html'), 1500);
      } catch (e) { showAlert(e.message, 'error'); }
    }

    async function handleAiCreate() {
      clearAlerts();
      const subject = document.getElementById('ai-subject').value.trim();
      const topic = document.getElementById('ai-topic').value.trim();
      const count = parseInt(document.getElementById('ai-count').value) || 10;
      const difficulty = document.getElementById('ai-difficulty').value;
      if (!subject || !topic) { showAlert('Subject and topic are required', 'error'); return; }
      try {
        await aiCreateExam(subject, topic, count, difficulty);
        showAlert('AI exam created successfully!', 'success');
        setTimeout(() => goTo('dashboard.html'), 2000);
      } catch (e) { showAlert(e.message, 'error'); }
    }
  </script>
  <script src="../../js/nav.js"></script>
</body>
</html>
