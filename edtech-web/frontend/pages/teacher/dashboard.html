<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teacher Dashboard - EdTech</title>
  <link rel="stylesheet" href="../../css/main.css">
  <link rel="stylesheet" href="../../css/dashboard.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar">
    <div class="navbar-brand">EdTech</div>
    <ul class="navbar-nav">
      <li><a href="dashboard.html" class="active">Dashboard</a></li>
      <li><a href="create-exam.html">Create Exam</a></li>
      <li><a href="students.html">Students</a></li>
      <li><a href="classes.html">Classes</a></li>
      <!-- USER -->
    </ul>
  </nav>
  <div class="layout">
    <aside class="sidebar">
      <ul class="sidebar-nav">
        <li><a href="dashboard.html" class="active"><span class="nav-icon">📊</span><span>Dashboard</span></a></li>
        <li><a href="create-exam.html"><span class="nav-icon">➕</span><span>Create Exam</span></a></li>
        <li><a href="students.html"><span class="nav-icon">👥</span><span>Students</span></a></li>
        <li><a href="classes.html"><span class="nav-icon">🏫</span><span>Classes</span></a></li>
        <li><a href="parent-contacts.html"><span class="nav-icon">👪</span><span>Parent Contacts</span></a></li>
        <li><a href="#" onclick="logout()"><span class="nav-icon">🚪</span><span>Logout</span></a></li>
      </ul>
    </aside>
    <main class="main-content">
      <div class="dashboard-header" style="display:flex;justify-content:space-between;align-items:center" data-aos="fade-up">
        <div>
          <h1>Welcome, <span id="teacher-name" class="gradient-text"></span></h1>
          <p>Teacher Dashboard</p>
        </div>
        <button class="btn btn-primary" onclick="goTo('create-exam.html')">+ New Exam</button>
      </div>
      <div id="alert-container"></div>
      <div class="stats-grid" id="stats-grid" data-aos="fade-up" data-aos-delay="100">
        <div class="stat-card stagger-1"><div class="stat-icon">📝</div><div class="stat-value" id="stat-exams">-</div><div class="stat-label">Total Exams</div></div>
        <div class="stat-card stagger-2"><div class="stat-icon">✅</div><div class="stat-value" id="stat-active">-</div><div class="stat-label">Active Exams</div></div>
        <div class="stat-card stagger-3"><div class="stat-icon">👥</div><div class="stat-value" id="stat-students">-</div><div class="stat-label">Students</div></div>
        <div class="stat-card stagger-4"><div class="stat-icon">🏫</div><div class="stat-value" id="stat-classes">-</div><div class="stat-label">Classes</div></div>
      </div>
      <h2 style="margin-bottom:16px" data-aos="fade-up" data-aos-delay="150">Your Exams</h2>
      <div id="exam-list" data-aos="fade-up" data-aos-delay="200">
        <div class="exam-grid">
          <div class="skeleton-card"><div class="skeleton-block"><div class="skeleton skeleton-title"></div><div class="skeleton skeleton-text"></div><div class="skeleton skeleton-text short"></div></div></div>
          <div class="skeleton-card"><div class="skeleton-block"><div class="skeleton skeleton-title"></div><div class="skeleton skeleton-text"></div><div class="skeleton skeleton-text short"></div></div></div>
        </div>
      </div>
    </main>
  </div>
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script>AOS.init({ once: true, offset: 50 });</script>
  <script src="../../js/api.js"></script>
  <script src="../../js/auth.js"></script>
  <script src="../../js/teacher.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      if (!requireRole('teacher')) return;
      document.getElementById('teacher-name').textContent = getUserName();
      setupNavbar();
      await loadStats();
      await loadExamList();
    });

    async function loadStats() {
      try {
        const [examsRes, studentsRes, classesRes] = await Promise.all([
          loadExams(1, 1),
          loadStudents(1, 1),
          loadClasses()
        ]);
        animateCounter('stat-exams', examsRes.pagination?.total || 0);
        animateCounter('stat-active', (examsRes.data || []).filter(e => e.status === 'active').length);
        animateCounter('stat-students', studentsRes.pagination?.total || 0);
        animateCounter('stat-classes', (classesRes || []).length);
      } catch (e) {}
    }

    function animateCounter(id, target) {
      const el = document.getElementById(id);
      if (!el) return;
      const numTarget = typeof target === 'number' ? target : parseFloat(target) || 0;
      const duration = 800;
      const start = performance.now();
      function update(now) {
        const progress = Math.min((now - start) / duration, 1);
        const eased = 1 - Math.pow(1 - progress, 3);
        el.textContent = Math.round(eased * numTarget);
        if (progress < 1) requestAnimationFrame(update);
      }
      requestAnimationFrame(update);
    }

    async function loadExamList() {
      try {
        const res = await loadExams(1, 20);
        const exams = res.data || [];
        const container = document.getElementById('exam-list');
        if (!exams.length) {
          container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📝</div><h3>No exams yet</h3><p>Create your first exam to get started.</p></div>';
          return;
        }
        container.innerHTML = '<div class="exam-grid">' + exams.map((e, i) => `
          <div class="exam-card animate-fade-up" style="animation-delay:${i * 0.05}s" onclick="goTo('edit-exam.html?id=${e.id}')">
            <div class="exam-card-title">${e.title}</div>
            <div class="exam-card-meta">
              <span>📖 ${e.subject}</span>
              <span>⏱ ${e.duration_minutes} min</span>
              <span>📄 ${e.total_questions} Q</span>
              <span>👥 ${e.students_attended || 0} attended</span>
              ${statusBadge(e.status)}
            </div>
            <div class="exam-card-footer">
              <span style="color:var(--text-dim);font-size:0.85rem">${formatDate(e.created_at)}</span>
              <div style="display:flex;gap:4px">
                ${e.status === 'draft' ? `<button class="btn btn-sm btn-success" onclick="event.stopPropagation();activateExamItem(${e.id})">Activate</button>` : ''}
                <button class="btn btn-sm btn-info" onclick="event.stopPropagation();goTo('statistics.html?id=${e.id}')">Stats</button>
              </div>
            </div>
          </div>
        `).join('') + '</div>';
      } catch (e) {
        document.getElementById('exam-list').innerHTML = `<div class="alert alert-error">${e.message}</div>`;
      }
    }

    async function activateExamItem(id) {
      try {
        await activateExam(id);
        showAlert('Exam activated successfully', 'success');
        await loadExamList();
      } catch (e) { showAlert(e.message, 'error'); }
    }
  </script>
</body>
</html>
