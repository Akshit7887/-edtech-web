<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teacher Dashboard - EdTech</title>
  <link rel="stylesheet" href="../../css/main.css">
  <link rel="stylesheet" href="../../css/dashboard.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <nav class="navbar">
    <a href="dashboard.html" class="navbar-brand">
      <span class="brand-dot"></span>
      EdTech
    </a>
    <ul class="navbar-nav">
      <li><a href="dashboard.html" class="active">Dashboard</a></li>
      <li><a href="create-exam.html">Create Exam</a></li>
      <li><a href="students.html">Students</a></li>
      <li><a href="classes.html">Classes</a></li>
    </ul>
  </nav>
  <div class="layout">
    <aside class="sidebar">
      <ul class="sidebar-nav">
        <li><a href="dashboard.html" class="active"><span class="nav-icon">&#x1F4CA;</span><span>Dashboard</span></a></li>
        <li><a href="create-exam.html"><span class="nav-icon">&#x2795;</span><span>Create Exam</span></a></li>
        <li><a href="students.html"><span class="nav-icon">&#x1F465;</span><span>Students</span></a></li>
        <li><a href="classes.html"><span class="nav-icon">&#x1F3EB;</span><span>Classes</span></a></li>
        <li><a href="parent-contacts.html"><span class="nav-icon">&#x1F46A;</span><span>Parent Contacts</span></a></li>
        <li><a href="#" onclick="logout()"><span class="nav-icon">&#x1F6AA;</span><span>Logout</span></a></li>
      </ul>
    </aside>
    <main class="main-content">
      <div class="page-header">
        <div>
          <h1>Welcome, <span id="teacher-name" style="color:var(--accent)"></span></h1>
          <p class="text-muted">Teacher Dashboard</p>
        </div>
        <button class="btn btn-primary" onclick="goTo('create-exam.html')">+ New Exam</button>
      </div>
      <div id="alert-container"></div>
      <div class="stats-row" id="stats-grid">
        <div class="stat-card reveal">
          <p class="stat-card-label">Total Exams</p>
          <p class="stat-card-value" id="stat-exams">-</p>
        </div>
        <div class="stat-card reveal">
          <p class="stat-card-label">Active Exams</p>
          <p class="stat-card-value accent" id="stat-active">-</p>
        </div>
        <div class="stat-card reveal">
          <p class="stat-card-label">Students</p>
          <p class="stat-card-value" id="stat-students">-</p>
        </div>
        <div class="stat-card reveal">
          <p class="stat-card-label">Classes</p>
          <p class="stat-card-value" id="stat-classes">-</p>
        </div>
      </div>
      <h2 style="margin-bottom:var(--space-4);font-size:var(--text-xl);">Your Exams</h2>
      <div id="exam-list"></div>
    </main>
  </div>

  <script src="../../js/api.js"></script>
  <script src="../../js/auth.js"></script>
  <script src="../../js/animations.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      if (!requireRole('teacher')) return;
      const name = getUserName();
      if (name) document.getElementById('teacher-name').textContent = name;
      setupNavbar();
      await loadStats();
      await loadExams();
    });

    async function loadStats() {
      try {
        const res = await api.get('/api/exams?page=1&limit=100');
        const exams = res.data || [];
        document.getElementById('stat-exams').textContent = exams.length;
        document.getElementById('stat-active').textContent = exams.filter(e => e.status === 'active').length;
        const studentsRes = await api.get('/api/teacher/students');
        const students = studentsRes.data || [];
        document.getElementById('stat-students').textContent = students.length;
        const classesRes = await api.get('/api/teacher/classes');
        const classes = classesRes.data || [];
        document.getElementById('stat-classes').textContent = classes.length;
      } catch (e) {
        showAlert(e.message, 'error', document.getElementById('alert-container'));
      }
    }

    async function loadExams() {
      try {
        const res = await api.get('/api/exams?page=1&limit=20');
        const exams = res.data || [];
        const container = document.getElementById('exam-list');
        if (!exams.length) {
          container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">&#x1F4DA;</div><h3>No exams yet</h3><p>Create your first exam to get started.</p></div>';
          return;
        }
        container.innerHTML = '<div class="exam-grid">' + exams.map((e, i) => `
          <div class="exam-card reveal" onclick="goTo('edit-exam.html?id=${e.id}')">
            <div class="exam-card-title">${e.title}</div>
            <div class="exam-card-meta">
              <span>&#x1F4D6; ${e.subject}</span>
              <span>&#x23F1; ${e.duration_minutes} min</span>
              <span>&#x1F4C4; ${e.total_questions} Q</span>
              ${statusBadge(e.status)}
            </div>
            <div class="exam-card-footer">
              <span style="color:var(--text-dim);font-size:0.85rem">${formatDate(e.created_at)}</span>
              <span class="btn btn-sm btn-ghost-red">Edit &#x2192;</span>
            </div>
          </div>
        `).join('') + '</div>';
      } catch (e) {
        document.getElementById('exam-list').innerHTML = `<div class="alert alert-red">${e.message}</div>`;
      }
    }
  </script>
</body>
</html>
