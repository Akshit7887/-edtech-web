<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Exam - EdTech</title>
  <link rel="stylesheet" href="../../css/main.css">
  <link rel="stylesheet" href="../../css/dashboard.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar">
    <div class="navbar-brand">EdTech</div>
    <ul class="navbar-nav">
      <li><a href="dashboard.html">Dashboard</a></li>
      <li><a href="create-exam.html">Create Exam</a></li>
      <li><a href="students.html">Students</a></li>
      <!-- USER -->
    </ul>
  </nav>
  <div class="layout">
    <aside class="sidebar">
      <ul class="sidebar-nav">
        <li><a href="dashboard.html"><span class="nav-icon">📊</span><span>Dashboard</span></a></li>
        <li><a href="questions.html?examId" id="questions-link"><span class="nav-icon">📋</span><span>Questions</span></a></li>
        <li><a href="statistics.html" id="stats-link"><span class="nav-icon">📈</span><span>Statistics</span></a></li>
        <li><a href="attendance.html" id="attendance-link"><span class="nav-icon">✅</span><span>Attendance</span></a></li>
        <li><a href="reports.html" id="reports-link"><span class="nav-icon">📄</span><span>Reports</span></a></li>
        <li><a href="#" onclick="logout()"><span class="nav-icon">🚪</span><span>Logout</span></a></li>
      </ul>
    </aside>
    <main class="main-content">
      <div id="alert-container"></div>
      <div id="exam-content" data-aos="fade-up"><div class="loading-overlay"><div class="spinner"></div><span>Loading exam...</span></div></div>
    </main>
  </div>
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script>AOS.init({ once: true });</script>
  <script src="../../js/api.js"></script>
  <script src="../../js/auth.js"></script>
  <script src="../../js/teacher.js"></script>
  <script>
    let examId = 0;

    document.addEventListener('DOMContentLoaded', async () => {
      if (!requireRole('teacher')) return;
      setupNavbar();
      examId = parseInt(getQueryParam('id'));
      if (!examId) { showAlert('No exam ID specified', 'error'); return; }

      document.querySelectorAll('#questions-link, #stats-link, #attendance-link, #reports-link').forEach(l => {
        l.href = l.href.replace('examId', `examId=${examId}`);
      });

      await loadExam();
    });

    async function loadExam() {
      try {
        const exam = await getExamDetail(examId);
        if (!exam) { document.getElementById('exam-content').innerHTML = '<div class="alert alert-error">Exam not found</div>'; return; }
        document.getElementById('exam-content').innerHTML = `
          <div class="dashboard-header" style="display:flex;justify-content:space-between;align-items:center">
            <div>
              <h1>${exam.title}</h1>
              <p>${exam.subject} · ${statusBadge(exam.status)} · ${exam.duration_minutes} min · ${exam.total_questions_count || exam.total_questions} questions</p>
            </div>
            <div style="display:flex;gap:8px">
              ${exam.status === 'draft' ? `<button class="btn btn-success" onclick="handleActivate()">Activate</button>` : ''}
              <button class="btn btn-danger" onclick="handleDelete()">Delete</button>
            </div>
          </div>
          <div class="card" style="margin-bottom:20px">
            <div class="card-header"><h3 class="card-title">Details</h3></div>
            <div class="card-body">
              <div class="row">
                <div class="col-2">
                  <div class="form-group form-floating"><input type="text" class="form-input" id="edit-title" value="${exam.title}" placeholder=" "><label class="form-label">Title</label></div>
                </div>
                <div class="col-2">
                  <div class="form-group form-floating"><input type="text" class="form-input" id="edit-subject" value="${exam.subject}" placeholder=" "><label class="form-label">Subject</label></div>
                </div>
              </div>
              <div class="form-group form-floating">
                <textarea class="form-textarea" id="edit-syllabus" placeholder=" " style="min-height:80px">${exam.syllabus_text || ''}</textarea>
                <label class="form-label">Syllabus</label>
              </div>
              <div class="row">
                <div class="col-3">
                  <div class="form-group form-floating"><input type="number" class="form-input" id="edit-duration" value="${exam.duration_minutes}" placeholder=" "><label class="form-label">Duration (min)</label></div>
                </div>
                <div class="col-3">
                  <div class="form-group form-floating"><input type="number" class="form-input" id="edit-total-q" value="${exam.total_questions_count || exam.total_questions}" placeholder=" "><label class="form-label">Total Questions</label></div>
                </div>
                <div class="col-3">
                  <div class="form-group"><label class="form-label">Status</label><select class="form-select" id="edit-status">
                    <option value="draft" ${exam.status === 'draft' ? 'selected' : ''}>Draft</option>
                    <option value="active" ${exam.status === 'active' ? 'selected' : ''}>Active</option>
                    <option value="closed" ${exam.status === 'closed' ? 'selected' : ''}>Closed</option>
                  </select></div>
                </div>
              </div>
              <button class="btn btn-primary" onclick="handleUpdate()">Save Changes</button>
            </div>
          </div>

          <div class="card" style="margin-bottom:20px">
            <div class="card-header"><h3 class="card-title">Deep Link</h3></div>
            <div class="card-body">
              <div class="deep-link-box">
                <code id="deep-link-text">Loading...</code>
                <button class="btn btn-sm btn-secondary" onclick="refreshDeepLink()">Generate</button>
              </div>
            </div>
          </div>

          <div class="card" style="margin-bottom:20px">
            <div class="card-header"><h3 class="card-title">Bulk Import Students</h3></div>
            <div class="card-body">
              <p style="color:var(--text-muted);font-size:0.85rem;margin-bottom:8px">Paste CSV with headers: name, phone, email</p>
              <textarea class="form-textarea" id="bulk-csv" placeholder="name,phone,email&#10;John Doe,+911234567890,john@example.com" style="min-height:80px"></textarea>
              <button class="btn btn-secondary" style="margin-top:8px" onclick="handleBulkImport()">Import Students</button>
            </div>
          </div>

          <div style="display:flex;gap:12px;flex-wrap:wrap">
            <a href="questions.html?examId=${examId}" class="btn btn-info">📋 Manage Questions</a>
            <a href="statistics.html?id=${examId}" class="btn btn-primary">📈 View Statistics</a>
            <a href="attendance.html?id=${examId}" class="btn btn-secondary">✅ Attendance</a>
            <a href="reports.html?id=${examId}" class="btn btn-warning">📄 Reports</a>
            <button class="btn btn-ghost" onclick="exportPdf(examId)">📥 Export PDF</button>
          </div>
        `;
        await refreshDeepLink();
      } catch (e) {
        document.getElementById('exam-content').innerHTML = `<div class="alert alert-error">${e.message}</div>`;
      }
    }

    async function handleUpdate() {
      clearAlerts();
      const data = {
        title: document.getElementById('edit-title').value.trim(),
        subject: document.getElementById('edit-subject').value.trim(),
        syllabus_text: document.getElementById('edit-syllabus').value.trim() || null,
        duration_minutes: parseInt(document.getElementById('edit-duration').value),
        total_questions: parseInt(document.getElementById('edit-total-q').value),
        status: document.getElementById('edit-status').value
      };
      try { await updateExam(examId, data); showAlert('Exam updated', 'success'); } catch (e) { showAlert(e.message, 'error'); }
    }

    async function handleActivate() {
      try { await activateExam(examId); showAlert('Exam activated', 'success'); await loadExam(); } catch (e) { showAlert(e.message, 'error'); }
    }

    async function handleDelete() {
      if (!await confirmAction('Delete this exam? This cannot be undone.')) return;
      try { await deleteExam(examId); showAlert('Exam deleted', 'success'); setTimeout(() => goTo('dashboard.html'), 1500); } catch (e) { showAlert(e.message, 'error'); }
    }

    async function refreshDeepLink() {
      try {
        const link = await generateDeepLink(examId);
        document.getElementById('deep-link-text').textContent = link;
      } catch (e) { document.getElementById('deep-link-text').textContent = 'Error generating link'; }
    }

    async function handleBulkImport() {
      clearAlerts();
      const csv = document.getElementById('bulk-csv').value.trim();
      if (!csv) { showAlert('Paste CSV data first', 'error'); return; }
      try {
        const result = await bulkImportStudents(examId, csv);
        showAlert(`Imported ${result.imported} students` + (result.errors?.length ? `. Errors: ${result.errors.join(', ')}` : ''), result.imported > 0 ? 'success' : 'error');
      } catch (e) { showAlert(e.message, 'error'); }
    }
  </script>
</body>
</html>
