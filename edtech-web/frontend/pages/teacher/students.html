<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Students - EdTech AI Test &amp; Learning App</title>
  <link rel="stylesheet" href="../../css/main.css">
  <link rel="stylesheet" href="../../css/dashboard.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar">
    <div class="navbar-brand"><span class="brand-logo"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/><path d="M8 7h8"/><path d="M8 11h6"/></svg></span>EdTech AI Test &amp; Learning App</div>
    <ul class="navbar-nav">
      <li><a href="dashboard.html">Dashboard</a></li>
      <li><a href="create-exam.html">Create Exam</a></li>
      <li><a href="students.html" class="active">Students</a></li>
      <li><a href="classes.html">Classes</a></li>
      <!-- USER -->
    </ul>
  </nav>
  <div class="layout">
    <aside class="sidebar">
      <ul class="sidebar-nav">
        <li><a href="dashboard.html"><span class="nav-icon">📊</span><span>Dashboard</span></a></li>
        <li><a href="students.html" class="active"><span class="nav-icon">👥</span><span>Students</span></a></li>
        <li><a href="classes.html"><span class="nav-icon">🏫</span><span>Classes</span></a></li>
        <li><a href="parent-contacts.html"><span class="nav-icon">👪</span><span>Parent Contacts</span></a></li>
        <li><a href="#" onclick="logout()"><span class="nav-icon">🚪</span><span>Logout</span></a></li>
      </ul>
    </aside>
    <main class="main-content">
      <div class="dashboard-header" style="display:flex;justify-content:space-between;align-items:center" data-aos="fade-up">
        <div>
          <h1>Students</h1>
          <p>Manage your students</p>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn btn-primary" onclick="showAddStudentModal()">➕ Add Student</button>
          <button class="btn btn-secondary" onclick="showAnnounceModal()">📢 Send Announcement</button>
        </div>
      </div>
      <div id="alert-container"></div>
      <div class="table-container" data-aos="fade-up" data-aos-delay="100">
        <table>
          <thead><tr><th>Name</th><th>Email</th><th>Phone</th><th>Class</th><th>Created</th><th>Actions</th></tr></thead>
          <tbody id="students-tbody">
            <tr><td colspan="6"><div class="loading-overlay"><div class="spinner"></div></div></td></tr>
          </tbody>
        </table>
      </div>
      <div class="pagination" id="students-pagination"></div>
    </main>
  </div>
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script>AOS.init({ once: true });</script>
  <script src="../../js/api.js"></script>
  <script src="../../js/auth.js"></script>
  <script src="../../js/teacher.js"></script>
  <script>
    let currentPage = 1;

    document.addEventListener('DOMContentLoaded', () => { if (!requireRole('teacher')) return; setupNavbar(); loadStudentsPage(1); });

    async function loadStudentsPage(page) {
      currentPage = page;
      try {
        const res = await loadStudents(page, 20);
        const students = res.data || [];
        const pagination = res.pagination || { page: 1, total: 0, total_pages: 1 };
        const tbody = document.getElementById('students-tbody');
        if (!students.length) {
          tbody.innerHTML = '<tr><td colspan="6"><div class="empty-state"><div class="empty-state-icon">👥</div><h3>No students found</h3></div></td></tr>';
        } else {
          tbody.innerHTML = students.map(s => `
            <tr>
              <td><div class="student-row"><div class="student-avatar">${s.name.charAt(0).toUpperCase()}</div><strong>${s.name}</strong></div></td>
              <td>${s.email || '-'}</td>
              <td>${s.phone || '-'}</td>
              <td>${s.class_name || '-'}</td>
              <td>${formatDate(s.created_at)}</td>
              <td>
                <button class="btn btn-sm btn-info" onclick="goTo('student-detail.html?id=${s.id}')">View</button>
                <button class="btn btn-sm btn-danger" onclick="confirmDeleteStudent(${s.id}, '${s.name.replace(/'/g, "\\'")}')">Delete</button>
              </td>
            </tr>
          `).join('');
        }
        renderPagination(pagination);
      } catch (e) {
        document.getElementById('students-tbody').innerHTML = `<tr><td colspan="6"><div class="alert alert-error">${e.message}</div></td></tr>`;
      }
    }

    function renderPagination(p) {
      const el = document.getElementById('students-pagination');
      if (p.total_pages <= 1) { el.innerHTML = ''; return; }
      let html = `<button onclick="loadStudentsPage(1)" ${p.page <= 1 ? 'disabled' : ''}>«</button>`;
      html += `<button onclick="loadStudentsPage(${p.page - 1})" ${p.page <= 1 ? 'disabled' : ''}>‹</button>`;
      html += `<span class="pagination-info">Page ${p.page} of ${p.total_pages} (${p.total} total)</span>`;
      html += `<button onclick="loadStudentsPage(${p.page + 1})" ${p.page >= p.total_pages ? 'disabled' : ''}>›</button>`;
      html += `<button onclick="loadStudentsPage(${p.total_pages})" ${p.page >= p.total_pages ? 'disabled' : ''}>»</button>`;
      el.innerHTML = html;
    }

    function showAddStudentModal() {
      const html = `
        <div class="form-group form-floating"><input class="form-input" id="new-student-name" placeholder=" "><label class="form-label">Student Name</label></div>
        <div class="form-group form-floating"><input class="form-input" id="new-student-email" type="email" placeholder=" "><label class="form-label">Email</label></div>
      `;
      const overlay = document.createElement('div'); overlay.className = 'modal-overlay active'; overlay.id = 'add-student-modal';
      overlay.innerHTML = `
        <div class="modal"><div class="modal-header"><h3>Add Student</h3><button class="modal-close" onclick="closeAddStudentModal()">×</button></div>
        <div class="modal-body">${html}</div>
        <div class="modal-footer"><button class="btn btn-secondary" onclick="closeAddStudentModal()">Cancel</button><button class="btn btn-primary" onclick="handleAddStudent()">Create</button></div></div>
      `;
      document.body.appendChild(overlay);
      setTimeout(() => document.getElementById('new-student-name')?.focus(), 100);
    }

    function closeAddStudentModal() { const m = document.getElementById('add-student-modal'); if (m) m.remove(); }

    async function handleAddStudent() {
      const name = document.getElementById('new-student-name').value.trim();
      const email = document.getElementById('new-student-email').value.trim();
      if (!name || !email) { showAlert('Name and email are required', 'error'); return; }
      try {
        await createStudent(name, email);
        showAlert('Student created successfully!', 'success');
        closeAddStudentModal();
        loadStudentsPage(currentPage);
      } catch (e) { showAlert(e.message, 'error'); }
    }

    function confirmDeleteStudent(id, name) {
      const overlay = document.createElement('div'); overlay.className = 'modal-overlay active'; overlay.id = 'delete-student-modal';
      overlay.innerHTML = `
        <div class="modal"><div class="modal-header"><h3>Delete Student</h3><button class="modal-close" onclick="closeDeleteStudentModal()">×</button></div>
        <div class="modal-body"><p>Are you sure you want to delete <strong>${name}</strong>? This action cannot be undone.</p></div>
        <div class="modal-footer"><button class="btn btn-secondary" onclick="closeDeleteStudentModal()">Cancel</button><button class="btn btn-danger" onclick="handleDeleteStudent(${id})">Delete</button></div></div>
      `;
      document.body.appendChild(overlay);
    }

    function closeDeleteStudentModal() { const m = document.getElementById('delete-student-modal'); if (m) m.remove(); }

    async function handleDeleteStudent(id) {
      try {
        await deleteStudent(id);
        showAlert('Student deleted successfully', 'success');
        closeDeleteStudentModal();
        loadStudentsPage(currentPage);
      } catch (e) { showAlert(e.message, 'error'); }
    }

    function showAnnounceModal() {
      const overlay = document.createElement('div'); overlay.className = 'modal-overlay active'; overlay.id = 'ann-modal';
      overlay.innerHTML = `
        <div class="modal ann-modal">
          <div class="modal-header"><h3>📢 Send Announcement</h3><button class="modal-close" onclick="closeAnnModal()">×</button></div>
          <div class="modal-body">
            <div class="form-group form-floating" style="margin-bottom:var(--space-5)">
              <input class="form-input" id="ann-title" placeholder=" " oninput="updatePreview()">
              <label class="form-label">Announcement Title</label>
            </div>
            <div class="form-group form-floating" style="margin-bottom:var(--space-6)">
              <textarea class="form-textarea" id="ann-message" placeholder=" " style="min-height:100px" oninput="updatePreview()"></textarea>
              <label class="form-label">Message</label>
            </div>
            <div class="ann-confirm-section" id="ann-teacher-confirm" onclick="toggleConfirm('teacher')">
              <div class="ann-confirm-header">
                <div class="confirm-icon teacher-icon">👨‍🏫</div>
                <div class="ann-confirm-info">
                  <strong>Teacher's Confirmation</strong>
                  <span>I confirm the content is accurate and appropriate for students</span>
                </div>
                <span class="ann-confirm-badge" id="teacher-badge">Pending</span>
              </div>
            </div>
            <div class="ann-confirm-section" id="ann-student-confirm" onclick="toggleConfirm('student')">
              <div class="ann-confirm-header">
                <div class="confirm-icon student-icon">👩‍🎓</div>
                <div class="ann-confirm-info">
                  <strong>Student Notification</strong>
                  <span>Notify all students in my classes about this announcement</span>
                </div>
                <span class="ann-confirm-badge" id="student-badge">Pending</span>
              </div>
              <div class="ann-student-preview" id="student-preview">
                <div class="ann-preview-header">📋 Student's View Preview</div>
                <div class="ann-preview-card">
                  <h4 id="preview-title">Announcement Title</h4>
                  <p id="preview-message">Your announcement message will appear here...</p>
                </div>
              </div>
            </div>
            <div class="ann-target-section">
              <label style="font-size:0.9rem;font-weight:600;color:var(--text-muted)">Send to:</label>
              <div class="ann-target-options" style="display:flex;gap:var(--space-2);margin-top:var(--space-2)">
                <label class="ann-target-option selected" id="target-classes" onclick="selectTarget('classes')" style="flex:1;padding:8px 12px;border:2px solid var(--border);border-radius:var(--radius-md);cursor:pointer;text-align:center;font-size:0.85rem">
                  <input type="radio" name="target" value="classes" checked hidden> 📚 My Classes
                </label>
                <label class="ann-target-option" id="target-students" onclick="selectTarget('students')" style="flex:1;padding:8px 12px;border:2px solid var(--border);border-radius:var(--radius-md);cursor:pointer;text-align:center;font-size:0.85rem">
                  <input type="radio" name="target" value="students" hidden> 👩‍🎓 All Students
                </label>
                <label class="ann-target-option" id="target-teachers" onclick="selectTarget('teachers')" style="flex:1;padding:8px 12px;border:2px solid var(--border);border-radius:var(--radius-md);cursor:pointer;text-align:center;font-size:0.85rem">
                  <input type="radio" name="target" value="teachers" hidden> 👨‍🏫 All Teachers
                </label>
                <label class="ann-target-option" id="target-all" onclick="selectTarget('all')" style="flex:1;padding:8px 12px;border:2px solid var(--border);border-radius:var(--radius-md);cursor:pointer;text-align:center;font-size:0.85rem">
                  <input type="radio" name="target" value="all" hidden> 🌐 Everyone
                </label>
              </div>
            </div>
          </div>
          <div class="modal-footer" style="flex-direction:column;gap:var(--space-3)">
            <button class="ann-send-btn" id="ann-send-btn" onclick="handleAnnounce()" disabled>
              <span class="btn-content">📨 Send Announcement</span>
              <span class="btn-spinner"></span>
            </button>
            <div style="display:flex;gap:var(--space-3);width:100%">
              <button class="btn btn-secondary" onclick="closeAnnModal()" style="flex:1">Cancel</button>
              <button class="btn btn-primary" onclick="document.getElementById('ann-title').value='';document.getElementById('ann-message').value='';updatePreview();confirmTeacher=false;confirmStudent=false;updateConfirmState()" style="flex:1">Reset</button>
            </div>
          </div>
        </div>
      `;
      document.body.appendChild(overlay);
      setTimeout(() => document.getElementById('ann-title')?.focus(), 100);
    }

    let confirmTeacher = false;
    let confirmStudent = false;
    let selectedTarget = 'classes';

    function selectTarget(target) {
      selectedTarget = target;
      document.querySelectorAll('.ann-target-option').forEach(el => el.classList.remove('selected'));
      document.getElementById('target-' + target).classList.add('selected');
    }

    function toggleConfirm(type) {
      if (type === 'teacher') {
        confirmTeacher = !confirmTeacher;
        const section = document.getElementById('ann-teacher-confirm');
        const badge = document.getElementById('teacher-badge');
        section.classList.toggle('confirmed', confirmTeacher);
        badge.textContent = confirmTeacher ? 'Confirmed ✓' : 'Pending';
      } else {
        confirmStudent = !confirmStudent;
        const section = document.getElementById('ann-student-confirm');
        const badge = document.getElementById('student-badge');
        const preview = document.getElementById('student-preview');
        section.classList.toggle('confirmed', confirmStudent);
        badge.textContent = confirmStudent ? 'Confirmed ✓' : 'Pending';
        preview.classList.toggle('visible', confirmStudent);
      }
      updateConfirmState();
    }

    function updateConfirmState() {
      const btn = document.getElementById('ann-send-btn');
      const title = document.getElementById('ann-title').value.trim();
      const msg = document.getElementById('ann-message').value.trim();
      btn.disabled = !(confirmTeacher && confirmStudent && title && msg);
    }

    function updatePreview() {
      const title = document.getElementById('ann-title').value.trim() || 'Announcement Title';
      const msg = document.getElementById('ann-message').value.trim() || 'Your announcement message will appear here...';
      document.getElementById('preview-title').textContent = title;
      document.getElementById('preview-message').textContent = msg;
      updateConfirmState();
    }

    function closeAnnModal() {
      const m = document.getElementById('ann-modal'); if (m) m.remove();
      confirmTeacher = false;
      confirmStudent = false;
    }

    function showSuccessPop(count) {
      const overlay = document.createElement('div'); overlay.className = 'success-pop-overlay'; overlay.id = 'success-pop';
      overlay.innerHTML = `
        <div class="success-pop">
          <div class="success-pop-icon">
            <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
          <h3>🎉 Announcement Sent!</h3>
          <p>Your announcement has been delivered to <strong>${count}</strong> recipient${count !== 1 ? 's' : ''} successfully.</p>
          <button class="btn btn-primary" onclick="closeSuccessPop()">Done</button>
        </div>
      `;
      document.body.appendChild(overlay);
    }

    function closeSuccessPop() {
      const m = document.getElementById('success-pop'); if (m) m.remove();
    }

    async function handleAnnounce() {
      const title = document.getElementById('ann-title').value.trim();
      const msg = document.getElementById('ann-message').value.trim();
      if (!confirmTeacher || !confirmStudent) { showAlert('Please confirm both sections before sending', 'error'); return; }
      if (!title || !msg) { showAlert('Title and message are required', 'error'); return; }
      const btn = document.getElementById('ann-send-btn');
      btn.classList.add('loading');
      btn.disabled = true;
      try {
        let role = null;
        if (selectedTarget === 'students') role = 'student';
        else if (selectedTarget === 'teachers') role = 'teacher';
        else if (selectedTarget === 'all') role = 'all';
        const res = await sendAnnouncement(title, msg, null, role);
        closeAnnModal();
        setTimeout(() => {
          const count = (res && res.data && res.data.sent_count) || 0;
          showSuccessPop(count);
        }, 150);
        loadStudentsPage(currentPage);
      } catch (e) {
        btn.classList.remove('loading');
        btn.disabled = false;
        showAlert(e.message, 'error');
      }
    }
  </script>
</body>
</html>
