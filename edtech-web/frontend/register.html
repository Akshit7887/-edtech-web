<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - EdTech</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/auth.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">
        <h1>📚 EdTech</h1>
        <p>Create your account</p>
      </div>
      <div id="alert-container"></div>
      <div class="auth-role-selector" id="role-selector">
        <button class="role-option selected" data-role="student" onclick="selectRole('student')">
          <span class="role-icon">🎓</span> Student
        </button>
        <button class="role-option" data-role="teacher" onclick="selectRole('teacher')">
          <span class="role-icon">👨‍🏫</span> Teacher
        </button>
      </div>
      <form id="register-form" onsubmit="handleRegister(event)">
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input type="text" class="form-input" id="name" placeholder="Enter your name" required>
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" class="form-input" id="email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="password-input-wrap">
            <input type="password" class="form-input" id="password" placeholder="Min 6 characters" minlength="6" required>
            <button type="button" class="toggle-password" onclick="togglePassword('password')">👁️</button>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Confirm Password</label>
          <div class="password-input-wrap">
            <input type="password" class="form-input" id="confirm-password" placeholder="Confirm password" minlength="6" required>
            <button type="button" class="toggle-password" onclick="togglePassword('confirm-password')">👁️</button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg" id="register-btn">
          <span id="register-text">Register</span>
          <span id="register-spinner" class="spinner spinner-sm" style="display:none"></span>
        </button>
      </form>
      <div class="auth-footer">
        <p>Already have an account? <a href="login.html">Sign in</a></p>
      </div>
    </div>
  </div>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    let selectedRole = 'student';

    function selectRole(role) {
      selectedRole = role;
      document.querySelectorAll('.role-option').forEach(el => {
        el.classList.toggle('selected', el.dataset.role === role);
      });
    }

    async function handleRegister(e) {
      e.preventDefault();
      clearAlerts();
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm-password').value;

      if (password !== confirm) {
        showAlert('Passwords do not match', 'error', document.getElementById('alert-container'));
        return;
      }

      const btn = document.getElementById('register-btn');
      const text = document.getElementById('register-text');
      const spinner = document.getElementById('register-spinner');
      btn.disabled = true; text.textContent = 'Registering...'; spinner.style.display = 'inline-block';

      try {
        const res = await sendRegisterOtp(name, email, password, selectedRole);
        showAlert(res.message || 'OTP sent to your email', 'success', document.getElementById('alert-container'));
        sessionStorage.setItem('otp_identifier', email);
        sessionStorage.setItem('otp_registration', 'true');
        setTimeout(() => goTo('otp-verify.html'), 1500);
      } catch (e) {
        showAlert(e.message, 'error', document.getElementById('alert-container'));
        btn.disabled = false; text.textContent = 'Register'; spinner.style.display = 'none';
      }
    }

    function togglePassword(id) {
      const el = document.getElementById(id);
      el.type = el.type === 'password' ? 'text' : 'password';
    }
  </script>
</body>
</html>
